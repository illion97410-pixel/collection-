<script>
var AK='8265bd1679663a7ea12ac168da84d2e8';
var SK='collection_v8',PK='posters_v2',MK='film_meta_v1',LK='film_tmdb_links';
var films=[],flt=0,vw=1,stOk=0;
var PC={},FM={},LM={};
var aT=null,mT=null,lT=null;
var aFilm=null,aF=[0,0,0,0];
var cxId=null,cxF=[0,0,0,0];
var lkId=null,lkSel=null;
var pmId=null,pmPath=null;

function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dot(v,c){return '<span class="dot '+(v?c:'de')+'"></span>';}


function migrate(){
  var oldKeys=[
    ['collection_v8','posters_v2','film_meta_v1','film_tmdb_links'],
    ['col_v9','pos_v3','meta_v2','lnk_v1']
  ];
  if(!localStorage.getItem(SK)){
    for(var i=0;i<oldKeys.length;i++){
      var old=localStorage.getItem(oldKeys[i][0]);
      if(old){
        localStorage.setItem(SK,old);
        var p=localStorage.getItem(oldKeys[i][1]);if(p)localStorage.setItem(PK,p);
        var m=localStorage.getItem(oldKeys[i][2]);if(m)localStorage.setItem(MK,m);
        var l=localStorage.getItem(oldKeys[i][3]);if(l)localStorage.setItem(LK,l);
        break;
      }
    }
  }
}

function go(){
  try{var s=localStorage.getItem(SK);films=s?JSON.parse(s):DF.map(function(f,i){var n=Object.assign({},f);n.id=i+1;return n;});}
  catch(x){films=DF.map(function(f,i){var n=Object.assign({},f);n.id=i+1;return n;});}
  try{PC=JSON.parse(localStorage.getItem(PK))||{};}catch(x){PC={};}
  try{FM=JSON.parse(localStorage.getItem(MK))||{};}catch(x){FM={};}
  try{LM=JSON.parse(localStorage.getItem(LK))||{};}catch(x){LM={};}
  ren();
}
function sv(){try{localStorage.setItem(SK,JSON.stringify(films));}catch(x){}}
function svP(){try{localStorage.setItem(PK,JSON.stringify(PC));}catch(x){}}
function svM(){try{localStorage.setItem(MK,JSON.stringify(FM));}catch(x){}}
function svL(){try{localStorage.setItem(LK,JSON.stringify(LM));}catch(x){}}

window.addEventListener('DOMContentLoaded',function(){migrate();go();});

function pg(i){
  var ids=['pg-col','pg-add','pg-stats'];
  var nids=['nb-col','nb-add','nb-stats'];
  ids.forEach(function(id,j){document.getElementById(id).className='pg'+(j===i?' on':'');});
  nids.forEach(function(id,j){document.getElementById(id).className='nb'+(j===i?' on':'');});
  if(i===2&&!stOk)ldStats();
}

function mf(f){
  if(flt===1)return f.bluray;
  if(flt===2)return f.bluray4k;
  if(flt===3)return f.dvd;
  if(flt===4)return f.steelbook;
  return true;
}

function gf(){
  var q=document.getElementById('srch').value.toLowerCase().trim();
  return films.filter(function(f){return(!q||f.title.toLowerCase().indexOf(q)>=0)&&mf(f);});
}

function srtd(arr){
  var s=parseInt(document.getElementById('srt').value||0);
  var a=arr.slice();
  if(s===0)a.sort(function(x,y){return x.title.localeCompare(y.title,'fr');});
  else if(s===1)a.sort(function(x,y){return y.title.localeCompare(x.title,'fr');});
  else if(s===2)a.sort(function(x,y){return (y.id||0)-(x.id||0);});
  else if(s===3)a.sort(function(x,y){return (x.id||0)-(y.id||0);});

  return a;
}

function updSt(){
  document.getElementById('s0').textContent=films.length+' films';
  document.getElementById('s1').textContent=films.filter(function(f){return f.bluray;}).length+' BLU';
  document.getElementById('s2').textContent=films.filter(function(f){return f.bluray4k;}).length+' 4K';
  document.getElementById('s3').textContent=films.filter(function(f){return f.dvd;}).length+' DVD';
  document.getElementById('s4').textContent=films.filter(function(f){return f.steelbook;}).length+' SB';
}

function ren(){
  updSt();
  var fl=srtd(gf());
  document.getElementById('rc').textContent=fl.length+' film'+(fl.length!==1?'s':'');
  if(vw)renGrid(fl);else renList(fl);
}

function renGrid(fl){
  var h='';
  fl.forEach(function(f){
    var c=PC[f.title.toLowerCase().trim()];
    var hi=c&&c!==null;
    var bd='';
    if(f.bluray)bd+='<span class="bd bb">BLU</span>';
    if(f.bluray4k)bd+='<span class="bd bk">4K</span>';
    if(f.dvd)bd+='<span class="bd bd2">DVD</span>';
    if(f.steelbook)bd+='<span class="bd bs">SB</span>';
    h+='<div class="gc">';
    if(f.steelbook)h+='<div class="crw">&#128081;</div>';
    h+='<div class="pw" onclick="opnFm('+f.id+')">';
    h+='<div class="ph" data-id="'+f.id+'"'+(hi?' style="display:none"':'')+'>&#9744;</div>';
    h+='<img class="gp'+(hi?' ok':'')+'" data-id="'+f.id+'" src="'+(hi?c:'')+'" alt="" loading="lazy">';
    h+='</div>';
    h+='<div class="mb" onclick="opnCx(event,'+f.id+')">&#183;&#183;&#183;</div>';
    h+='<div class="gi"><div class="gt">'+e(f.title)+'</div><div class="gb">'+bd+'</div></div>';
    h+='</div>';
  });
  document.getElementById('gv').innerHTML=h;
  document.getElementById('lv').style.display='none';
  document.getElementById('gv').style.display='';
  ldPos(fl);
}

function renList(fl){
  var h='';
  fl.forEach(function(f){
    var c=PC[f.title.toLowerCase().trim()];
    var src=c&&c!==null?c:'';
    h+='<tr>';
    h+='<td><div class="ltc"><img class="lth" data-id="'+f.id+'" src="'+src+'" alt="" loading="lazy" style="opacity:'+(src?1:.2)+'" onclick="opnFm('+f.id+')"><span onclick="opnFm('+f.id+')" style="cursor:pointer">'+e(f.title)+'</span></div></td>';
    h+='<td>'+dot(f.bluray,'db')+'</td><td>'+dot(f.bluray4k,'dk')+'</td><td>'+dot(f.dvd,'dd')+'</td><td>'+dot(f.steelbook,'ds')+'</td>';
    h+='<td><button class="lmb" onclick="opnCx(event,'+f.id+')">&#183;&#183;&#183;</button></td>';
    h+='</tr>';
  });
  document.getElementById('lb').innerHTML=h;
  document.getElementById('gv').style.display='none';
  document.getElementById('lv').style.display='';
  ldPos(fl);
}

async function ldPos(fl){
  var uc=fl.filter(function(f){return PC[f.title.toLowerCase().trim()]===undefined;});
  for(var i=0;i<uc.length;i+=5){
    await Promise.all(uc.slice(i,i+5).map(function(f){return gtPos(f.title,f.id);}));
    await new Promise(function(r){setTimeout(r,200);});
  }
}

function setVw(v){
  vw=v;
  document.getElementById('vbg').className='vb'+(v?' on':'');
  document.getElementById('vbl').className='vb'+(v?'':' on');
  ren();
}

function setFlt(f,btn){
  flt=f;
  var cls=['on','ob','ok','od','os'];
  document.querySelectorAll('.fbtn').forEach(function(b){b.className='fbtn';});
  btn.className='fbtn '+cls[f];
  ren();
}

function onSrch(){
  clearTimeout(mT);ren();
  var q=document.getElementById('srch').value.toLowerCase().trim();
  if(q.length>=2)mT=setTimeout(function(){renMeta(q);},400);
}

function renMeta(q){
  var tIds=new Set(gf().map(function(f){return f.id;}));
  var mIds=new Set();
  var CN={FR:'France',US:'Etats-Unis',GB:'Royaume-Uni',IT:'Italie',DE:'Allemagne',JP:'Japon',ES:'Espagne',KR:'Coree',CN:'Chine'};
  Object.keys(FM).forEach(function(key){
    var m=FM[key];if(!m)return;
    var dm=m.director&&m.director.toLowerCase().indexOf(q)>=0;
    var am=m.cast&&m.cast.some(function(a){return a.name&&a.name.toLowerCase().indexOf(q)>=0;});
    var cm=m.countries&&m.countries.some(function(c){return(CN[c]||'').toLowerCase().indexOf(q)>=0;});
    if(dm||am||cm){var f=films.find(function(x){return x.title.toLowerCase().trim()===key;});if(f)mIds.add(f.id);}
  });
  if(mIds.size>0){
    var all=new Set(Array.from(tIds).concat(Array.from(mIds)));
    var filtered=srtd(films.filter(function(f){return all.has(f.id)&&mf(f);}));
    document.getElementById('rc').textContent=filtered.length+' films trouves';
    if(vw)renGrid(filtered);else renList(filtered);
  }
}

function opnCx(ev,id){
  ev.stopPropagation();
  var f=films.find(function(x){return x.id==id;});if(!f)return;
  cxId=id;cxF=[f.bluray?1:0,f.bluray4k?1:0,f.dvd?1:0,f.steelbook?1:0];
  document.getElementById('cth').textContent=f.title;
  updCx();
  var m=document.getElementById('ctx');m.style.display='block';
  document.getElementById('cov').style.display='block';
  m.style.top=Math.min(ev.clientY,window.innerHeight-260)+'px';
  m.style.left=Math.min(ev.clientX,window.innerWidth-220)+'px';
}

function updCx(){
  var labs=['BLU-RAY','4K UHD','DVD','SB'];
  var cls=['ab','ak','ad','as'];
  var h='';
  for(var i=0;i<4;i++){
    h+='<span class="cf '+(cxF[i]?cls[i]:'')+'" onclick="tgCx('+i+')">'+(cxF[i]?'&#10003; ':'')+labs[i]+'</span>';
  }
  document.getElementById('ctf').innerHTML=h;
}

function tgCx(i){cxF[i]=cxF[i]?0:1;updCx();}

function svCx(){
  var f=films.find(function(x){return x.id==cxId;});
  if(f){f.bluray=!!cxF[0];f.bluray4k=!!cxF[1];f.dvd=!!cxF[2];f.steelbook=!!cxF[3];sv();ren();toast('Formats mis a jour');}
  clCx();
}

function delCx(){
  var f=films.find(function(x){return x.id==cxId;});
  if(!f||!confirm('Supprimer '+f.title+' ?'))return;
  films=films.filter(function(x){return x.id!=cxId;});
  sv();ren();toast('Supprime');clCx();
}

function clCx(){document.getElementById('ctx').style.display='none';document.getElementById('cov').style.display='none';}

function opnLk(){
  clCx();
  var f=films.find(function(x){return x.id==cxId;});if(!f)return;
  lkId=cxId;lkSel=null;
  document.getElementById('lsub').textContent=f.title;
  var ct=f.title.replace(/\s*\(\d{4}\)$/,'').trim();
  document.getElementById('lsi').value=ct;
  document.getElementById('lrs').innerHTML='';
  document.getElementById('lmb2').className='lmb2 on';
  setTimeout(function(){onLkSrch(ct);},150);
}

function clLk(){document.getElementById('lmb2').className='lmb2';lkId=null;lkSel=null;}

function onLkSrch(q){
  clearTimeout(lT);
  if(!q||q.length<2)return;
  lT=setTimeout(async function(){
    try{
      var r=await fetch('https://api.themoviedb.org/3/search/movie?api_key='+AK+'&query='+encodeURIComponent(q)+'&language=fr-FR&page=1');
      var d=await r.json();
      var cont=document.getElementById('lrs');
      if(!d.results||!d.results.length){cont.innerHTML='<div style="color:var(--dim);padding:10px;font-size:13px">Aucun resultat</div>';return;}
      var h='';
      d.results.slice(0,8).forEach(function(m){
        var yr=m.release_date?m.release_date.substring(0,4):'';
        var ps=m.poster_path?'https://image.tmdb.org/t/p/w92'+m.poster_path:'';
        h+='<div class="lr" data-id="'+m.id+'" data-ps="'+ps+'" data-tt="'+e(m.title)+'" data-yr="'+yr+'" onclick="selLk(this)">';
        if(ps)h+='<img src="'+ps+'" alt="">';
        else h+='<div style="width:33px;height:50px;background:var(--c2);border-radius:4px;flex-shrink:0"></div>';
        h+='<div class="lri"><div class="lrt">'+e(m.title)+'</div><div class="lrm">'+yr+(m.original_title&&m.original_title!==m.title?' - '+e(m.original_title):'')+'</div></div>';
        h+='</div>';
      });
      cont.innerHTML=h;
    }catch(x){}
  },350);
}

function selLk(el){
  document.querySelectorAll('.lr').forEach(function(x){x.className='lr';});
  el.className='lr on';
  lkSel={id:parseInt(el.dataset.id),ps:el.dataset.ps,tt:el.dataset.tt,yr:el.dataset.yr};
}

async function svLk(){
  if(!lkSel){toast('Selectionne un film');return;}
  var f=films.find(function(x){return x.id==lkId;});if(!f)return;
  var key=f.title.toLowerCase().trim();
  delete FM[key];delete PC[key];
  LM[key]=lkSel.id;svL();
  toast('Mise a jour...');clLk();
  await gtMetaById(lkSel.id,f.title,f.id);
  ren();toast('Film corrige !');
}

function opnPm(){
  clCx();
  var f=films.find(function(x){return x.id==cxId;});if(!f)return;
  pmId=cxId;pmPath=null;
  document.getElementById('psub').textContent=f.title;
  document.getElementById('pgr').innerHTML='<div style="color:var(--dim);padding:10px;grid-column:1/-1">Chargement...</div>';
  document.getElementById('pmb').className='pmb on';
  ldPm(f);
}

async function ldPm(f){
  var key=f.title.toLowerCase().trim();
  var tid=LM[key]||(FM[key]&&FM[key].tmdbId);
  if(!tid){var m=await gtMeta(f.title,f.id);if(m)tid=m.tmdbId;}
  if(!tid){document.getElementById('pgr').innerHTML='<div style="color:var(--dim);padding:10px;grid-column:1/-1">Film non identifie.</div>';return;}
  try{
    var r=await fetch('https://api.themoviedb.org/3/movie/'+tid+'/images?api_key='+AK);
    var d=await r.json();
    var ps=(d.posters||[]).slice(0,20);
    if(!ps.length){document.getElementById('pgr').innerHTML='<div style="color:var(--dim);padding:10px;grid-column:1/-1">Aucune affiche alternative.</div>';return;}
    var cur=PC[key];
    var h='';
    ps.forEach(function(p,i){
      var url='https://image.tmdb.org/t/p/w300'+p.file_path;
      var sel=cur&&cur===url;
      if(sel)pmPath=p.file_path;
      var lang=p.iso_639_1?p.iso_639_1.toUpperCase():'';
      h+='<div class="po'+(sel?' on':'')+'" onclick="selPo(this)" data-path="'+p.file_path+'">';
      h+='<img src="'+url+'" alt="" loading="lazy">';
      if(lang)h+='<div class="pla">'+lang+'</div>';
      h+='<div class="pch">&#10003;</div>';
      h+='</div>';
    });
    document.getElementById('pgr').innerHTML=h;
  }catch(x){document.getElementById('pgr').innerHTML='<div style="color:var(--dim);padding:10px;grid-column:1/-1">Erreur.</div>';}
}

function selPo(el){
  document.querySelectorAll('.po').forEach(function(x){x.className='po';});
  el.className='po on';
  pmPath=el.dataset.path;
}

function svPm(){
  if(!pmPath){toast('Selectionne une affiche');return;}
  var f=films.find(function(x){return x.id==pmId;});if(!f)return;
  var key=f.title.toLowerCase().trim();
  PC[key]='https://image.tmdb.org/t/p/w300'+pmPath;
  svP();updPD(pmId,PC[key]);clPm();toast('Affiche mise a jour');
}

function clPm(){document.getElementById('pmb').className='pmb';pmId=null;pmPath=null;}

async function opnFm(id){
  var f=films.find(function(x){return x.id==id;});if(!f)return;
  var c=PC[f.title.toLowerCase().trim()];
  var fh='';
  if(f.bluray)fh+='<span class="fft ffb">BLU-RAY</span>';
  if(f.bluray4k)fh+='<span class="fft ffk">4K UHD</span>';
  if(f.dvd)fh+='<span class="fft ffd">DVD</span>';
  if(f.steelbook)fh+='<span class="fft ffs2">STEELBOOK</span>';
  document.getElementById('fh').innerHTML=
    '<button class="fbk" onclick="clFm()">&#10005;</button>'+
    '<img class="fp" src="'+(c||'')+'" alt="" style="'+(c?'':'opacity:.3')+'">'+
    '<div class="ffi"><div class="ftb">'+e(f.title)+'</div>'+
    '<div style="font-size:11px;color:var(--dim);margin-top:3px" id="fdir">Chargement...</div>'+
    '<div style="font-size:10px;color:var(--dim);margin-top:2px" id="fmet"></div>'+
    '<div style="font-size:13px;color:var(--dvd);font-weight:700;margin-top:5px" id="frat"></div>'+
    '<div class="ffs">'+fh+'</div></div>';

  document.getElementById('fmb').className='fmb on';
  document.body.style.overflow='hidden';
  var meta=await gtMeta(f.title,f.id);
  if(!meta){
    document.getElementById('fbdy').innerHTML='<div style="color:var(--dim);padding:16px;text-align:center">Infos non disponibles.<br><br><button onclick="cxId='+f.id+';opnLk()" style="background:var(--pu);color:#fff;border:none;padding:8px 14px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600">Corriger ce film</button></div>';
    return;
  }
  var de=document.getElementById('fdir');
  if(de){de.textContent=meta.director||'';de.style.color='var(--pu2)';}
  var me=document.getElementById('fmet');
  if(me)me.textContent=[meta.year,meta.runtime?meta.runtime+' min':'',meta.country||''].filter(Boolean).join(' - ');
  var re=document.getElementById('frat');
  if(re&&meta.rating)re.textContent='★ '+meta.rating.toFixed(1)+' / 10';
  var gh='',ch='',sh='',tr2='';
  (meta.genres||[]).forEach(function(g){gh+='<span class="fge">'+e(g)+'</span>';});
  (meta.cast||[]).slice(0,5).forEach(function(a){
    ch+='<div class="fpe"><div class="fav">'+(a.photo?'<img src="'+a.photo+'" alt="">':'')+'</div>';
    ch+='<div><div class="fpn">'+e(a.name)+'</div><div class="fpr">'+e(a.character||'')+'</div></div></div>';
  });
  var sim=await gtSim(meta.tmdbId,f.id);
  if(sim.length){
    sh='<div class="fsec">SIMILAIRES DANS TA COLLECTION</div><div class="simgr">';
    sim.forEach(function(x){
      var sp=PC[x.title.toLowerCase().trim()];
      sh+='<div class="smc" onclick="clFm();setTimeout(function(){opnFm('+x.id+');},250)">';
      sh+=(sp?'<img class="smp" src="'+sp+'" alt="" loading="lazy">':'<div class="smp"></div>');
      sh+='<div class="smt">'+e(x.title)+'</div></div>';
    });

  var bd='';

  if(ch)bd+='<div class="fsec">ACTEURS</div><div class="fcc">'+ch+'</div>';

async function gtSim(tid,exId){
  if(!tid)return[];
  try{
    var r=await fetch('https://api.themoviedb.org/3/movie/'+tid+'/similar?api_key='+AK+'&language=fr-FR&page=1');
    var d=await r.json();var res=[];
    (d.results||[]).slice(0,20).forEach(function(m){
      var x=films.find(function(f){
        if(f.id===exId)return false;
        var ft=f.title.toLowerCase().replace(/\s*\(\d{4}\)$/,'').trim();
        return ft===m.title.toLowerCase().trim();
      });
      if(x&&res.length<6)res.push(x);
    });
    return res;
  }catch(x){return[];}
}

function clFm(){document.getElementById('fmb').className='fmb';document.body.style.overflow='';}

function onAddSrch(q){
  clearTimeout(aT);
  var res=document.getElementById('tr');
  if(!q||q.length<2){res.style.display='none';return;}
  aT=setTimeout(async function(){
    try{
      var r=await fetch('https://api.themoviedb.org/3/search/movie?api_key='+AK+'&query='+encodeURIComponent(q)+'&language=fr-FR&page=1');
      var d=await r.json();
      if(!d.results||!d.results.length){res.style.display='block';res.innerHTML='<div style="padding:12px;color:var(--dim);font-size:13px">Aucun resultat</div>';return;}
      res.style.display='block';
      var h='';
      d.results.slice(0,8).forEach(function(m){
        var yr=m.release_date?m.release_date.substring(0,4):'';
        var ps=m.poster_path?'https://image.tmdb.org/t/p/w92'+m.poster_path:'';
        var ex=findC(m.title,yr);
        var bd='';
        if(ex){
          if(ex.bluray)bd+='<span class="trbo">BLU</span>';
          if(ex.bluray4k)bd+='<span class="trbo">4K</span>';
          if(ex.dvd)bd+='<span class="trbo">DVD</span>';
          if(ex.steelbook)bd+='<span class="trbo">SB</span>';
        }else{bd='<span class="trbn">Pas dans ta collection</span>';}
        h+='<div class="tri" data-id="'+m.id+'" data-tt="'+e(m.title)+'" data-yr="'+yr+'" data-ps="'+ps+'" onclick="selAdd(this)">';
        h+=(ps?'<img class="trt" src="'+ps+'" alt="">':'<div class="trt"></div>');
        h+='<div class="trin"><div class="trtt">'+e(m.title)+'</div><div class="trty">'+yr+'</div><div class="tro">'+bd+'</div></div>';
        h+='</div>';
      });
      res.innerHTML=h;
    }catch(x){res.style.display='none';}
  },350);
}

function findC(tt,yr){
  var cl=function(t){return t.toLowerCase().trim().replace(/\s*\(\d{4}\)$/,'');};
  return films.find(function(f){return cl(f.title)===cl(tt)||f.title.toLowerCase()===tt.toLowerCase();});
}

function selAdd(el){
  var dat={id:parseInt(el.dataset.id),tt:el.dataset.tt,yr:el.dataset.yr,ps:el.dataset.ps};
  document.getElementById('tr').style.display='none';
  document.getElementById('asi').value='';
  aFilm=dat;
  var ex=findC(dat.tt,dat.yr);
  var pe=document.getElementById('fmtposter');
  if(dat.ps){pe.src=dat.ps;pe.style.display='block';}else pe.style.display='none';
  document.getElementById('fmttl').textContent=dat.tt;
  document.getElementById('fmtyr').textContent=dat.yr?'('+dat.yr+')':'';
  if(ex){
    aF=[ex.bluray?1:0,ex.bluray4k?1:0,ex.dvd?1:0,ex.steelbook?1:0];
    document.getElementById('fmtsv').textContent='Mettre a jour';
  }else{
    aF=[0,0,0,0];
    document.getElementById('fmtsv').textContent='Ajouter';
  }
  updFmt();
  document.getElementById('fmtb').className='fmtb on';
}

function tgF(i){aF[i]=aF[i]?0:1;updFmt();}

function updFmt(){
  var ids=['fo-b','fo-k','fo-d','fo-s'];
  var cids=['fc-b','fc-k','fc-d','fc-s'];
  var cls=['sb','sk','sd','ss'];
  var base=['fo fo1','fo fo2','fo fo3','fo fo4'];
  for(var i=0;i<4;i++){
    document.getElementById(ids[i]).className=base[i]+(aF[i]?' '+cls[i]:'');
    document.getElementById(cids[i]).textContent=aF[i]?'OK':'○';

function clFmt(){document.getElementById('fmtb').className='fmtb';aFilm=null;}

function svFilm(){
  if(!aFilm)return;
  if(!aF[0]&&!aF[1]&&!aF[2]&&!aF[3]){alert('Selectionne au moins un format !');return;}
  var dt=aFilm.yr?aFilm.tt+' ('+aFilm.yr+')':aFilm.tt;
  if(aFilm.ps){PC[dt.toLowerCase().trim()]=aFilm.ps.replace('/w92/','/w300/');svP();}
  var ex=findC(aFilm.tt,aFilm.yr);
  if(ex){ex.bluray=!!aF[0];ex.bluray4k=!!aF[1];ex.dvd=!!aF[2];ex.steelbook=!!aF[3];sv();ren();clFmt();toast(aFilm.tt+' mis a jour');}
  else{films.push({id:Date.now(),title:dt,bluray:!!aF[0],bluray4k:!!aF[1],dvd:!!aF[2],steelbook:!!aF[3]});sv();ren();clFmt();toast(aFilm.tt+' ajoute');}
}

async function gtMeta(tt,id){
  var key=tt.toLowerCase().trim();
  if(FM[key])return FM[key];
  if(LM[key])return await gtMetaById(LM[key],tt,id);
  try{
    var yr=null,ym=tt.match(/\((\d{4})\)$/);
    if(ym)yr=ym[1];
    var ct=tt.replace(/\s*\(\d{4}\)$/,'').trim();
    var url='https://api.themoviedb.org/3/search/movie?api_key='+AK+'&query='+encodeURIComponent(ct)+'&language=fr-FR';
    if(yr)url+='&year='+yr;
    var r=await fetch(url);var d=await r.json();
    if(!d.results||!d.results.length)return null;
    var best=d.results[0];
    if(yr){var y2=d.results.find(function(m){return m.release_date&&m.release_date.indexOf(yr)===0;});if(y2)best=y2;}
    return await gtMetaById(best.id,tt,id);
  }catch(x){return null;}
}

async function gtMetaById(tid,tt,fid){
  var key=tt.toLowerCase().trim();
  try{
    var rs=await Promise.all([
      fetch('https://api.themoviedb.org/3/movie/'+tid+'?api_key='+AK+'&language=fr-FR'),
      fetch('https://api.themoviedb.org/3/movie/'+tid+'/credits?api_key='+AK),
      fetch('https://api.themoviedb.org/3/movie/'+tid+'/videos?api_key='+AK+'&language=fr-FR')
    ]);
    var dt=await rs[0].json(),cr=await rs[1].json(),vd=await rs[2].json();
    var dir='';(cr.crew||[]).forEach(function(c){if(c.job==='Director')dir=c.name;});
    var cast=(cr.cast||[]).slice(0,6).map(function(a){return{name:a.name,character:a.character,photo:a.profile_path?'https://image.tmdb.org/t/p/w92'+a.profile_path:null};});
    var trl=null;(vd.results||[]).forEach(function(v){if(!trl&&v.type==='Trailer'&&v.site==='YouTube')trl=v;});
    if(!trl&&vd.results&&vd.results.length)trl=vd.results[0];
    var CF={FR:'France',US:'Etats-Unis',GB:'Royaume-Uni',IT:'Italie',DE:'Allemagne',JP:'Japon'};
    var c0=dt.production_countries&&dt.production_countries[0]?dt.production_countries[0].iso_3166_1:'';
    var ctry=CF[c0]||(dt.production_countries&&dt.production_countries[0]?dt.production_countries[0].name:'');
    var ctrs=(dt.production_countries||[]).map(function(c){return c.iso_3166_1;});
    var m={tmdbId:tid,title:dt.title,year:dt.release_date?dt.release_date.substring(0,4):null,overview:dt.overview,rating:dt.vote_average,runtime:dt.runtime,country:ctry,genres:(dt.genres||[]).map(function(g){return g.name;}),director:dir,cast:cast,posterPath:dt.poster_path,countries:ctrs,trailerId:trl?trl.key:null};
    FM[key]=m;svM();
    if(dt.poster_path){PC[key]='https://image.tmdb.org/t/p/w300'+dt.poster_path;svP();updPD(fid,PC[key]);}
    return m;
  }catch(x){return null;}
}

async function gtPos(tt,id){
  var key=tt.toLowerCase().trim();
  if(PC[key]!==undefined)return PC[key];
  if(FM[key]&&FM[key].posterPath){var u='https://image.tmdb.org/t/p/w300'+FM[key].posterPath;PC[key]=u;svP();updPD(id,u);return u;}
  if(LM[key])return(await gtMetaById(LM[key],tt,id))?PC[key]:null;
  try{
    var yr=null,ym=tt.match(/\((\d{4})\)$/);if(ym)yr=ym[1];
    var ct=tt.replace(/\s*\(\d{4}\)$/,'').trim();
    var url='https://api.themoviedb.org/3/search/movie?api_key='+AK+'&query='+encodeURIComponent(ct)+'&language=fr-FR';
    if(yr)url+='&year='+yr;
    var r=await fetch(url);var d=await r.json();
    if(d.results&&d.results.length){
      var best=d.results[0];
      if(yr){var y2=d.results.find(function(m){return m.release_date&&m.release_date.indexOf(yr)===0;});if(y2)best=y2;}
      if(best.poster_path){var iu='https://image.tmdb.org/t/p/w300'+best.poster_path;PC[key]=iu;svP();updPD(id,iu);return iu;}
    }
    url='https://api.themoviedb.org/3/search/movie?api_key='+AK+'&query='+encodeURIComponent(ct)+'&language=en-US';
    if(yr)url+='&year='+yr;
    r=await fetch(url);d=await r.json();
    if(d.results&&d.results.length&&d.results[0].poster_path){
      var iu2='https://image.tmdb.org/t/p/w300'+d.results[0].poster_path;PC[key]=iu2;svP();updPD(id,iu2);return iu2;
    }
  }catch(x){}
  PC[key]=null;return null;
}

function updPD(id,url){
  document.querySelectorAll('.gp[data-id="'+id+'"]').forEach(function(el){el.src=url;el.className='gp ok';});
  document.querySelectorAll('.ph[data-id="'+id+'"]').forEach(function(el){el.style.display='none';});
  document.querySelectorAll('.lth[data-id="'+id+'"]').forEach(function(el){el.src=url;el.style.opacity='1';});
}

async function ldStats(){
  stOk=1;
  var tot=films.length,nb=0,nk=0,nd=0,ns=0;
  films.forEach(function(f){if(f.bluray)nb++;if(f.bluray4k)nk++;if(f.dvd)nd++;if(f.steelbook)ns++;});
  var sc=document.getElementById('stc');
  sc.innerHTML=
    '<div class="stsc"><div class="sttl">Vue ensemble</div><div class="stn">'+
    '<div class="stnc"><div class="stnum">'+tot+'</div><div class="stnlb">FILMS</div></div>'+
    '<div class="stnc"><div class="stnum" style="color:var(--stl)">'+ns+'</div><div class="stnlb">STEELBOOKS</div></div>'+
    '<div class="stnc"><div class="stnum" style="color:var(--blu)">'+nb+'</div><div class="stnlb">BLU-RAY</div></div>'+
    '<div class="stnc"><div class="stnum" style="color:var(--k4)">'+nk+'</div><div class="stnlb">4K UHD</div></div>'+
    '</div></div>'+
    '<div class="stpb" id="stpb"><div id="stpt">Analyse... 0%</div><div class="stpbr"><div class="stpbf" id="stpbf" style="width:0%"></div></div></div>'+
    '<div id="stad"></div>';
  var dirs={},ctrs={},decs={},gnrs={},acts={},done=0;
  for(var i=0;i<films.length;i+=8){
    await Promise.all(films.slice(i,i+8).map(async function(f){
      var m=await gtMeta(f.title,f.id);
      if(m){
        if(m.director)dirs[m.director]=(dirs[m.director]||0)+1;
        (m.countries||[]).forEach(function(c){ctrs[c]=(ctrs[c]||0)+1;});
        if(m.year){var dec=Math.floor(parseInt(m.year)/10)*10;decs[dec]=(decs[dec]||0)+1;}
        (m.genres||[]).forEach(function(g){gnrs[g]=(gnrs[g]||0)+1;});
        (m.cast||[]).slice(0,3).forEach(function(a){if(a.name)acts[a.name]=(acts[a.name]||0)+1;});
      }
      done++;
    }));
    var pct=Math.round(done/tot*100);
    var pf=document.getElementById('stpbf');if(pf)pf.style.width=pct+'%';
    var pt=document.getElementById('stpt');if(pt)pt.textContent='Analyse... '+pct+'%';
    if(done%80===0||done===tot)renSt(dirs,ctrs,decs,gnrs,acts);
  }
  var pb=document.getElementById('stpb');if(pb)pb.style.display='none';
  renSt(dirs,ctrs,decs,gnrs,acts);
}

function renSt(dirs,ctrs,decs,gnrs,acts){
  var el=document.getElementById('stad');if(!el)return;
  var CN={FR:'France',US:'Etats-Unis',GB:'Royaume-Uni',IT:'Italie',DE:'Allemagne',JP:'Japon',ES:'Espagne',KR:'Coree',CN:'Chine',BE:'Belgique',SE:'Suede',RU:'Russie'};
  var td=Object.entries(dirs).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
  var tc=Object.entries(ctrs).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
  var tg=Object.entries(gnrs).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
  var ta=Object.entries(acts).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
  var md=td[0]?td[0][1]:1,mc=tc[0]?tc[0][1]:1,mg=tg[0]?tg[0][1]:1,ma=ta[0]?ta[0][1]:1;
  var mxd=Math.max.apply(null,Object.values(decs).concat([1]));
  var dl=[1920,1930,1940,1950,1960,1970,1980,1990,2000,2010,2020].filter(function(d){return decs[d];});
  var db='';
  dl.forEach(function(d){db+='<div class="stdb"><div class="stdf'+(decs[d]===mxd?' mx':'')+'" style="height:'+Math.round(decs[d]/mxd*54)+'px"></div><div class="stdl">'+String(d).slice(-2)+'s</div></div>';});
  function bs(ttl,items,mx,tp){
    var h='<div class="stsc"><div class="sttl">'+ttl+'</div><div class="stcd">';
    items.forEach(function(it,i){
      var nm=it[0],cnt=it[1];
      var disp=tp==='c'?(CN[nm]||nm):nm;
      var sid='dd'+(tp+nm).replace(/[^a-zA-Z0-9]/g,'');
      h+='<div class="stbr" data-sid="'+sid+'" data-tp="'+tp+'" data-val="'+encodeURIComponent(nm)+'" onclick="tgDD(this)">';
      h+='<div class="stbl" style="color:'+(i===0?'var(--pu2)':'var(--txt)')+'">'+e(disp)+'</div>';
      h+='<div class="stbt"><div class="stbf" style="width:'+Math.round(cnt/mx*100)+'%"></div></div>';
      h+='<div class="stbc">'+cnt+'</div>';
      h+='</div><div class="stdd" id="'+sid+'"></div>';
    });
    return h+'</div></div>';
  }
  var h='<div class="stsc"><div class="sttl">Par decennie</div><div class="stcd"><div class="stdc">'+db+'</div></div></div>';
  h+=bs('Top realisateurs',td,md,'d');
  h+=bs('Top acteurs',ta,ma,'a');
  h+=bs('Top pays',tc,mc,'c');
  h+=bs('Top genres',tg,mg,'g');
  el.innerHTML=h;
}

function tgDD(el){
  var sid=el.dataset.sid,tp=el.dataset.tp,val=decodeURIComponent(el.dataset.val);
  var dd=document.getElementById(sid);if(!dd)return;
  if(dd.className==='stdd on'){dd.className='stdd';return;}
  document.querySelectorAll('.stdd.on').forEach(function(x){x.className='stdd';});
  var CN={FR:'France',US:'Etats-Unis',GB:'Royaume-Uni',IT:'Italie',DE:'Allemagne',JP:'Japon',ES:'Espagne',KR:'Coree',CN:'Chine',BE:'Belgique'};
  var mx=[];
  films.forEach(function(f){
    var m=FM[f.title.toLowerCase().trim()];if(!m)return;
    if(tp==='d'&&m.director===val)mx.push(f);
    else if(tp==='a'&&m.cast&&m.cast.some(function(a){return a.name===val;}))mx.push(f);
    else if(tp==='c'&&m.countries&&m.countries.indexOf(val)>=0)mx.push(f);
    else if(tp==='g'&&m.genres&&m.genres.indexOf(val)>=0)mx.push(f);
  });
  if(!mx.length){dd.innerHTML='<div style="color:var(--dim);font-size:12px;padding:6px">Aucun film charge</div>';dd.className='stdd on';return;}
  var disp=tp==='c'?(CN[val]||val):val;
  var h='<div class="stddtl">'+mx.length+' films - '+e(disp)+'</div><div class="ddgr">';
  mx.forEach(function(f){
    var cp=PC[f.title.toLowerCase().trim()];
    h+='<div class="ddc" onclick="pg(0);setTimeout(function(){opnFm('+f.id+');},250)">';
    h+=(cp?'<img class="ddp" src="'+cp+'" alt="" loading="lazy">':'<div class="ddp"></div>');
    h+='<div class="ddt">'+e(f.title)+'</div></div>';
  });
  dd.innerHTML=h+'</div>';dd.className='stdd on';
}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  clearTimeout(t._t);t._t=setTimeout(function(){t.style.display='none';},2500);
}

document.addEventListener('click',function(ev){
  if(!ev.target.closest('#pg-add'))document.getElementById('tr').style.display='none';
});

</script>
