<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ma Collection</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ma Collection">
<meta name="theme-color" content="#080810">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;--surface:#0f0f1a;--card:#141420;--card2:#1a1a2a;
  --border:#252535;--text:#e8e8f5;--muted:#5a5a75;
  --blu:#4a9eff;--k4:#b060ff;--dvd:#ffb030;--steel:#20d090;--red:#ff4060;--orange:#ff8c00;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
#login-screen{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 24px;max-width:340px;width:100%;text-align:center}
.login-box h2{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;margin-bottom:6px}
.login-box p{font-size:13px;color:var(--muted);margin-bottom:24px}
.login-box input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:10px;font-family:'Inter',sans-serif;font-size:15px;outline:none;text-align:center;letter-spacing:3px;margin-bottom:12px}
.login-btn{width:100%;background:var(--text);color:var(--bg);border:none;padding:12px;border-radius:10px;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.login-error{color:var(--red);font-size:12px;margin-top:8px;display:none}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:200}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
h1{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--text);white-space:nowrap}
.header-actions{display:flex;gap:6px}
.view-btn{background:var(--card2);border:1px solid var(--border);color:var(--muted);padding:6px 10px;border-radius:7px;cursor:pointer;font-size:16px;transition:all .15s}
.view-btn.active{border-color:var(--muted);color:var(--text)}
.stats-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.stat{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:.5px;white-space:nowrap}
.s-total{background:var(--border);color:var(--muted)}
.s-blu{background:rgba(74,158,255,.12);color:var(--blu)}
.s-4k{background:rgba(176,96,255,.12);color:var(--k4)}
.s-dvd{background:rgba(255,176,48,.12);color:var(--dvd)}
.s-steel{background:rgba(32,208,144,.12);color:var(--steel)}
.search-bar input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;outline:none}
.search-bar input::placeholder{color:var(--muted)}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.fbtn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.fbtn.fa{background:var(--text);color:var(--bg);border-color:var(--text)}
.fbtn.fb{background:rgba(74,158,255,.18);color:var(--blu);border-color:var(--blu)}
.fbtn.f4{background:rgba(176,96,255,.18);color:var(--k4);border-color:var(--k4)}
.fbtn.fd{background:rgba(255,176,48,.18);color:var(--dvd);border-color:var(--dvd)}
.fbtn.fs{background:rgba(32,208,144,.18);color:var(--steel);border-color:var(--steel)}
.add-panel{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px}
.panel-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:8px}
.add-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.add-row input{flex:1;min-width:160px;background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;outline:none}
.fmt-checks{display:flex;gap:6px;flex-wrap:wrap}
.fcheck input{display:none}
.fcheck-label{padding:6px 11px;border-radius:7px;border:1px solid var(--border);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--muted);background:var(--card);user-select:none}
.fcheck input:checked + .bl{background:rgba(74,158,255,.2);color:var(--blu);border-color:var(--blu)}
.fcheck input:checked + .k4{background:rgba(176,96,255,.2);color:var(--k4);border-color:var(--k4)}
.fcheck input:checked + .dv{background:rgba(255,176,48,.2);color:var(--dvd);border-color:var(--dvd)}
.fcheck input:checked + .st{background:rgba(32,208,144,.2);color:var(--steel);border-color:var(--steel)}
.btn-add{background:var(--text);color:var(--bg);border:none;padding:8px 16px;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.scan-panel{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px}
.scan-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.btn-scan{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center}
.btn-scan:hover{border-color:var(--muted)}
.btn-scan.blu{color:var(--k4);border-color:var(--k4)}
.btn-scan.dvd{color:var(--dvd);border-color:var(--dvd)}
#scan-status{font-size:12px;color:var(--muted);padding:8px 12px;background:var(--card);border-radius:8px;display:none;margin-top:6px}
.src-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:10px;display:none}
.src-title{font-size:14px;font-weight:700;margin-bottom:8px}
.src-status{font-size:12px;margin-bottom:10px;padding:6px 10px;border-radius:6px;font-weight:600}
.src-status.ok{background:rgba(32,208,144,.12);color:var(--steel)}
.src-status.warn{background:rgba(255,140,0,.12);color:var(--orange)}
.src-status.bad{background:rgba(255,64,96,.12);color:var(--red)}
.src-fmts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.src-fmt{padding:4px 10px;border-radius:6px;border:1px solid var(--border);font-size:11px;font-weight:600}
.src-fmt.owned{background:rgba(32,208,144,.1);border-color:var(--steel);color:var(--steel)}
.src-fmt.miss{background:rgba(255,64,96,.08);border-color:var(--red);color:var(--red)}
.src-actions{display:flex;gap:8px;flex-wrap:wrap}
.src-btn{padding:8px 14px;border-radius:8px;font-family:'Inter',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border:none}
.src-btn-ok{background:var(--text);color:var(--bg)}
.src-btn-cancel{background:var(--card2);color:var(--muted)}
.content-wrap{padding:0 12px 80px}
.result-count{font-size:11px;color:var(--muted);padding:10px 4px 6px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;padding:4px}
.grid-card{background:var(--card);border-radius:10px;overflow:hidden;transition:transform .15s,box-shadow .15s;position:relative;border:1px solid var(--border)}
.grid-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.5)}
.poster-wrap{position:relative;width:100%;aspect-ratio:2/3;background:var(--card2);overflow:hidden}
.grid-poster{width:100%;height:100%;object-fit:cover;display:none}
.grid-poster.loaded{display:block}
.poster-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;position:absolute;top:0;left:0}
.grid-info{padding:8px}
.grid-title{font-size:11px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.grid-badges{display:flex;gap:3px;flex-wrap:wrap}
.badge{font-size:8px;font-weight:700;padding:2px 5px;border-radius:4px}
.b-blu{background:rgba(74,158,255,.2);color:var(--blu)}
.b-4k{background:rgba(176,96,255,.2);color:var(--k4)}
.b-dvd{background:rgba(255,176,48,.2);color:var(--dvd)}
.b-steel{background:rgba(32,208,144,.2);color:var(--steel)}
.grid-del{position:absolute;top:5px;right:5px;background:rgba(8,8,16,.8);border:none;color:var(--muted);width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:12px;display:none;align-items:center;justify-content:center}
.grid-card:hover .grid-del{display:flex}
.grid-del:hover{background:var(--red);color:#fff}
.steel-crown{position:absolute;top:5px;left:5px;font-size:14px;text-shadow:0 1px 4px rgba(0,0,0,.8)}
.list-wrap{overflow-x:auto}
.list-table{width:100%;border-collapse:collapse;min-width:420px}
.list-table thead th{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:10px 10px 8px;border-bottom:1px solid var(--border);text-align:left;background:var(--bg)}
.list-table thead th:not(:first-child){text-align:center}
.list-table tbody tr{border-bottom:1px solid rgba(37,37,53,.5);transition:background .1s}
.list-table tbody tr:hover{background:var(--surface)}
.list-table td{padding:8px 10px;font-size:12px;vertical-align:middle}
.list-table td:not(:first-child){text-align:center}
.list-thumb{width:28px;height:42px;object-fit:cover;border-radius:3px;background:var(--card2);margin-right:8px;vertical-align:middle}
.list-title-cell{display:flex;align-items:center}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%}
.d-blu{background:var(--blu)}.d-4k{background:var(--k4)}.d-dvd{background:var(--dvd)}.d-steel{background:var(--steel)}
.d-empty{background:transparent;border:1px solid var(--border)}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:2px 5px;border-radius:4px;opacity:0}
tr:hover .del-btn{opacity:1}
.del-btn:hover{color:var(--red)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--steel);color:#000;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;z-index:999;display:none;white-space:nowrap}
@media(max-width:500px){.grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div style="font-size:48px;margin-bottom:12px">🎬</div>
    <h2>MA COLLECTION</h2>
    <p>Entre le mot de passe pour accéder</p>
    <input type="password" id="pwd-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPwd()">
    <button class="login-btn" onclick="checkPwd()">Entrer</button>
    <div class="login-error" id="login-error">❌ Mot de passe incorrect</div>
  </div>
</div>

<header>
  <div class="header-top">
    <h1>🎬 MA COLLECTION</h1>
    <div class="header-actions">
      <button class="view-btn active" id="btn-grid" onclick="setView('grid')">⊞</button>
      <button class="view-btn" id="btn-list" onclick="setView('list')">☰</button>
    </div>
  </div>
  <div class="stats-row">
    <span class="stat s-total" id="st-total">— films</span>
    <span class="stat s-blu" id="st-blu">● BLU-RAY</span>
    <span class="stat s-4k" id="st-4k">● 4K</span>
    <span class="stat s-dvd" id="st-dvd">● DVD</span>
    <span class="stat s-steel" id="st-steel">● STEELBOOK</span>
  </div>
  <div class="search-bar">
    <input type="text" id="search" placeholder="🔍 Rechercher un film..." oninput="render()">
  </div>
  <div class="filters">
    <button class="fbtn fa" id="f-all" onclick="setFilter('all',this)">Tous</button>
    <button class="fbtn" id="f-blu" onclick="setFilter('bluray',this)">Blu-ray</button>
    <button class="fbtn" id="f-4k" onclick="setFilter('bluray4k',this)">4K</button>
    <button class="fbtn" id="f-dvd" onclick="setFilter('dvd',this)">DVD</button>
    <button class="fbtn" id="f-steel" onclick="setFilter('steelbook',this)">Steelbook</button>
  </div>
</header>

<div class="add-panel">
  <div class="panel-title">➕ Ajouter manuellement</div>
  <div class="add-row">
    <input type="text" id="new-title" placeholder="Titre du film..." onkeydown="if(event.key==='Enter')addFilm()">
    <div class="fmt-checks">
      <label class="fcheck"><input type="checkbox" id="a-bl"><span class="fcheck-label bl">Blu-ray</span></label>
      <label class="fcheck"><input type="checkbox" id="a-4k"><span class="fcheck-label k4">4K</span></label>
      <label class="fcheck"><input type="checkbox" id="a-dv"><span class="fcheck-label dv">DVD</span></label>
      <label class="fcheck"><input type="checkbox" id="a-st"><span class="fcheck-label st">Steelbook</span></label>
    </div>
    <button class="btn-add" onclick="addFilm()">Ajouter</button>
  </div>
</div>

<div class="scan-panel">
  <div class="panel-title">📷 Ajouter par photo</div>
  <div class="scan-row">
    <button class="btn-scan blu" onclick="triggerScan('barcode')">📷 Photo code-barres</button>
    <button class="btn-scan dvd" onclick="triggerScan('poster')">🎬 Photo pochette</button>
  </div>
  <input type="file" id="scan-input" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(this)">
  <div id="scan-status"></div>
  <div class="src-card" id="src-card">
    <div class="src-title" id="src-title"></div>
    <div class="src-status" id="src-status"></div>
    <div class="src-fmts" id="src-fmts"></div>
    <div class="src-actions" id="src-actions"></div>
  </div>
</div>

<div class="content-wrap">
  <div class="result-count" id="result-count"></div>
  <div id="grid-view" class="grid"></div>
  <div id="list-view" class="list-wrap" style="display:none">
    <table class="list-table">
      <thead><tr>
        <th>FILM</th><th>BLU-RAY</th><th>4K</th><th>DVD</th><th>STEELBOOK</th><th></th>
      </tr></thead>
      <tbody id="list-body"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

let films = [], currentFilter = 'all', currentView = 'grid';
let posterCache = {};
let scanMode = null;

// ---- LOGIN ----
function checkPwd() {
  const val = document.getElementById('pwd-input').value;
  if (val === APP_PASSWORD) {
    sessionStorage.setItem('auth','1');
    document.getElementById('login-screen').style.display = 'none';
    init();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pwd-input').value = '';
    setTimeout(() => document.getElementById('login-error').style.display = 'none', 2000);
  }
}
if (sessionStorage.getItem('auth')==='1') {
  document.getElementById('login-screen').style.display = 'none';
  document.addEventListener('DOMContentLoaded', init);
} else {
  document.addEventListener('DOMContentLoaded', () => document.getElementById('pwd-input').focus());
}

// ---- INIT ----
function init() {
  try { films = JSON.parse(localStorage.getItem(STORAGE_KEY)) || DEFAULT_FILMS.map((f,i)=>({...f,id:i+1})); }
  catch(e) { films = DEFAULT_FILMS.map((f,i)=>({...f,id:i+1})); }
  try { posterCache = JSON.parse(localStorage.getItem(POSTER_KEY)) || {}; }
  catch(e) { posterCache = {}; }
  render();
}
function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(films)); } catch(e){} }
function savePosters() { try { localStorage.setItem(POSTER_KEY, JSON.stringify(posterCache)); } catch(e){} }

// ---- SCAN ----
function triggerScan(mode) {
  scanMode = mode;
  document.getElementById('scan-input').value = '';
  document.getElementById('scan-input').click();
}

async function handlePhoto(input) {
  const file = input.files[0];
  if (!file) return;

  setStatus('🔍 Analyse en cours...', 'warn');
  document.getElementById('src-card').style.display = 'none';

  // Convert to base64
  const base64 = await new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => res(reader.result.split(',')[1]);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });

  // Build prompt based on mode
  const prompt = scanMode === 'barcode'
    ? 'Tu vois une photo d\'un code-barres EAN sur un DVD ou Blu-ray. Lis le code-barres et identifie le film. Réponds UNIQUEMENT avec ce JSON exact sans markdown: {"title":"titre du film en français si possible","year":"année de sortie","format":"bluray" ou "bluray4k" ou "dvd"}. Si tu ne peux pas identifier le film réponds: {"title":null}'
    : 'Tu vois la pochette d\'un DVD ou Blu-ray. Identifie le film. Réponds UNIQUEMENT avec ce JSON exact sans markdown: {"title":"titre du film en français si possible","year":"année de sortie","format":"bluray" ou "bluray4k" ou "dvd"}. Si tu ne peux pas identifier réponds: {"title":null}';

  try {
    // Use Claude via a CORS-friendly proxy
    const response = await fetch('https://api.allorigins.win/post', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        url: 'https://api.anthropic.com/v1/messages',
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'anthropic-version': '2023-06-01',
          'x-api-key': 'NEEDS_KEY'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 150,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: file.type || 'image/jpeg', data: base64 } },
              { type: 'text', text: prompt }
            ]
          }]
        })
      })
    });

    const data = await response.json();
    const result = JSON.parse(data.contents || '{}');
    const text = result.content?.[0]?.text || '';
    processAIResult(text);
  } catch(e) {
    // Fallback: use TMDB image search by trying to extract text from image
    setStatus('⚠️ Service IA indisponible. Entre le titre manuellement.', 'bad');
  }
}

function processAIResult(text) {
  let parsed;
  try {
    parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
  } catch(e) { parsed = null; }

  if (!parsed || !parsed.title) {
    setStatus('⚠️ Film non identifié. Entre le titre manuellement ci-dessus.', 'bad');
    return;
  }

  setStatus('', '');
  document.getElementById('scan-status').style.display = 'none';

  const title = parsed.year ? `${parsed.title} (${parsed.year})` : parsed.title;
  const format = parsed.format || null;
  showScanResult(title, format);
}

function setStatus(msg, type) {
  const el = document.getElementById('scan-status');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
  el.style.color = type === 'bad' ? 'var(--red)' : type === 'warn' ? 'var(--orange)' : 'var(--muted)';
}

function showScanResult(scannedTitle, scannedFormat) {
  const card = document.getElementById('src-card');
  card.style.display = 'block';
  const existing = findInCollection(scannedTitle);
  const fmtLabels = { bluray:'Blu-ray', bluray4k:'4K UHD', dvd:'DVD', steelbook:'Steelbook' };

  document.getElementById('src-title').textContent = '🎬 ' + scannedTitle;

  if (existing) {
    const owned = ['bluray','bluray4k','dvd','steelbook'].filter(k => existing[k]);
    const missing = ['bluray','bluray4k','dvd','steelbook'].filter(k => !existing[k]);
    const fmtOwned = scannedFormat ? existing[scannedFormat] : false;

    if (!scannedFormat || fmtOwned) {
      document.getElementById('src-status').className = 'src-status ok';
      document.getElementById('src-status').textContent = '✅ Tu as déjà ce film !';
    } else {
      document.getElementById('src-status').className = 'src-status warn';
      document.getElementById('src-status').textContent = '⚠️ Tu as ce film mais pas en ' + (fmtLabels[scannedFormat]||scannedFormat) + ' !';
    }

    document.getElementById('src-fmts').innerHTML =
      owned.map(k => `<span class="src-fmt owned">✓ ${fmtLabels[k]}</span>`).join('') +
      missing.map(k => `<span class="src-fmt miss">✗ ${fmtLabels[k]}</span>`).join('');

    const missingFmts = missing.filter(k => k !== 'steelbook');
    document.getElementById('src-actions').innerHTML =
      missingFmts.map(k => `<button class="src-btn src-btn-ok" onclick="addFormat(${existing.id},'${k}')">+ Ajouter ${fmtLabels[k]}</button>`).join('') +
      `<button class="src-btn src-btn-cancel" onclick="closeCard()">Fermer</button>`;
  } else {
    document.getElementById('src-status').className = 'src-status bad';
    document.getElementById('src-status').textContent = "❌ Ce film n'est pas dans ta collection.";

    const fmtHtml = ['bluray','bluray4k','dvd','steelbook'].map(k => `
      <label class="fcheck">
        <input type="checkbox" id="sf-${k}" ${k===scannedFormat?'checked':''}>
        <span class="fcheck-label ${k==='bluray'?'bl':k==='bluray4k'?'k4':k==='dvd'?'dv':'st'}" style="font-size:11px;padding:5px 9px">${fmtLabels[k]}</span>
      </label>`).join('');

    document.getElementById('src-fmts').innerHTML = '';
    document.getElementById('src-actions').innerHTML =
      `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">${fmtHtml}</div>
       <div style="display:flex;gap:8px">
         <button class="src-btn src-btn-ok" onclick="addFromScan('${scannedTitle.replace(/'/g,"\\'")}')">➕ Ajouter</button>
         <button class="src-btn src-btn-cancel" onclick="closeCard()">Annuler</button>
       </div>`;
  }
}

function findInCollection(title) {
  const clean = t => t.toLowerCase().replace(/\s*\(\d{4}\)$/, '').trim();
  const ct = clean(title);
  return films.find(f => clean(f.title) === ct || f.title.toLowerCase() === title.toLowerCase());
}

function addFormat(filmId, format) {
  const f = films.find(x => x.id == filmId);
  if (f) { f[format] = true; save(); render(); toast('✅ Format ajouté !'); closeCard(); }
}

function addFromScan(title) {
  const bluray = document.getElementById('sf-bluray')?.checked||false;
  const bluray4k = document.getElementById('sf-bluray4k')?.checked||false;
  const dvd = document.getElementById('sf-dvd')?.checked||false;
  const steelbook = document.getElementById('sf-steelbook')?.checked||false;
  if (!bluray&&!bluray4k&&!dvd&&!steelbook) { alert('Sélectionne au moins un format !'); return; }
  addFilm(title, {bluray, bluray4k, dvd, steelbook});
  closeCard();
}

function closeCard() {
  document.getElementById('src-card').style.display = 'none';
  document.getElementById('scan-status').style.display = 'none';
}

// ---- POSTER ----
async function getPoster(title, filmId) {
  const key = title.toLowerCase().trim();
  if (posterCache[key] !== undefined) return posterCache[key];
  const yearMatch = title.match(/\((\d{4})\)$/);
  const year = yearMatch ? yearMatch[1] : null;
  const cleanTitle = title.replace(/\s*\(\d{4}\)$/, '').trim();
  const variations = [cleanTitle, cleanTitle.replace(/^(le |la |les |l'|un |une |des )/i,'').trim()];
  for (const lang of ['fr-FR','en-US']) {
    for (const v of [...new Set(variations)]) {
      try {
        let url = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(v)}&language=${lang}`;
        if (year) url += `&year=${year}`;
        const r = await fetch(url);
        const d = await r.json();
        if (d.results?.length > 0) {
          let best = d.results[0];
          if (year) { const ym = d.results.find(m => m.release_date?.startsWith(year)); if (ym) best = ym; }
          if (best.poster_path) {
            const imgUrl = 'https://image.tmdb.org/t/p/w300' + best.poster_path;
            posterCache[key] = imgUrl; savePosters();
            updatePosterDOM(filmId, imgUrl); return imgUrl;
          }
        }
      } catch(e) {}
    }
  }
  posterCache[key] = null; return null;
}

function updatePosterDOM(id, url) {
  const gp = document.querySelector(`.grid-poster[data-id="${id}"]`);
  if (gp) { gp.src = url; gp.classList.add('loaded'); }
  const ph = document.querySelector(`.poster-ph[data-id="${id}"]`);
  if (ph) ph.style.display = 'none';
  const lp = document.querySelector(`.list-thumb[data-id="${id}"]`);
  if (lp) { lp.src = url; lp.style.opacity = '1'; }
}

// ---- RENDER ----
function updateStats() {
  document.getElementById('st-total').textContent = films.length + ' films';
  document.getElementById('st-blu').textContent = '● ' + films.filter(f=>f.bluray).length + ' BLU-RAY';
  document.getElementById('st-4k').textContent = '● ' + films.filter(f=>f.bluray4k).length + ' 4K';
  document.getElementById('st-dvd').textContent = '● ' + films.filter(f=>f.dvd).length + ' DVD';
  document.getElementById('st-steel').textContent = '● ' + films.filter(f=>f.steelbook).length + ' STEELBOOK';
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  return films.filter(f => {
    const matchTitle = !q || f.title.toLowerCase().includes(q);
    let matchFmt = true;
    if (currentFilter === 'bluray') matchFmt = f.bluray === true;
    else if (currentFilter === 'bluray4k') matchFmt = f.bluray4k === true;
    else if (currentFilter === 'dvd') matchFmt = f.dvd === true;
    else if (currentFilter === 'steelbook') matchFmt = f.steelbook === true;
    return matchTitle && matchFmt;
  });
}

function render() {
  updateStats();
  const filtered = getFiltered();
  document.getElementById('result-count').textContent = filtered.length + ' film' + (filtered.length!==1?'s':'');
  currentView==='grid' ? renderGrid(filtered) : renderList(filtered);
}

function renderGrid(filtered) {
  document.getElementById('grid-view').innerHTML = filtered.map(f => {
    const cached = posterCache[f.title.toLowerCase().trim()];
    const hasImg = cached && cached !== null;
    const badges = [
      f.bluray?'<span class="badge b-blu">BLU-RAY</span>':'',
      f.bluray4k?'<span class="badge b-4k">4K</span>':'',
      f.dvd?'<span class="badge b-dvd">DVD</span>':'',
      f.steelbook?'<span class="badge b-steel">SB</span>':''
    ].join('');
    return `<div class="grid-card">
      ${f.steelbook?'<div class="steel-crown">👑</div>':''}
      <div class="poster-wrap">
        <div class="poster-ph" data-id="${f.id}" style="${hasImg?'display:none':''}">🎬</div>
        <img class="grid-poster${hasImg?' loaded':''}" data-id="${f.id}" src="${hasImg?cached:''}" alt="" loading="lazy">
      </div>
      <div class="grid-info">
        <div class="grid-title">${esc(f.title)}</div>
        <div class="grid-badges">${badges}</div>
      </div>
      <button class="grid-del" onclick="deleteFilm(${f.id},event)">✕</button>
    </div>`;
  }).join('');
  loadPosters(filtered);
}

function renderList(filtered) {
  document.getElementById('list-body').innerHTML = filtered.map(f => {
    const cached = posterCache[f.title.toLowerCase().trim()];
    const src = (cached && cached !== null) ? cached : '';
    return `<tr>
      <td><div class="list-title-cell">
        <img class="list-thumb" data-id="${f.id}" src="${src}" alt="" loading="lazy" style="opacity:${src?'1':'.2'}">
        ${esc(f.title)}
      </div></td>
      <td>${dot(f.bluray,'blu')}</td><td>${dot(f.bluray4k,'4k')}</td>
      <td>${dot(f.dvd,'dvd')}</td><td>${dot(f.steelbook,'steel')}</td>
      <td><button class="del-btn" onclick="deleteFilm(${f.id},event)">✕</button></td>
    </tr>`;
  }).join('');
  loadPosters(filtered);
}

async function loadPosters(filtered) {
  const uncached = filtered.filter(f => posterCache[f.title.toLowerCase().trim()] === undefined);
  for (let i = 0; i < uncached.length; i += 5) {
    await Promise.all(uncached.slice(i,i+5).map(f => getPoster(f.title, f.id)));
    await new Promise(r => setTimeout(r, 250));
  }
}

function dot(v,c) { return `<span class="dot ${v?'d-'+c:'d-empty'}"></span>`; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function setView(v) {
  currentView = v;
  document.getElementById('grid-view').style.display = v==='grid'?'':'none';
  document.getElementById('list-view').style.display = v==='list'?'':'none';
  document.getElementById('btn-grid').classList.toggle('active', v==='grid');
  document.getElementById('btn-list').classList.toggle('active', v==='list');
  render();
}

function setFilter(f, btn) {
  currentFilter = f;
  ['f-all','f-blu','f-4k','f-dvd','f-steel'].forEach(id => document.getElementById(id).className = 'fbtn');
  const clsMap = {all:'fbtn fa', bluray:'fbtn fb', bluray4k:'fbtn f4', dvd:'fbtn fd', steelbook:'fbtn fs'};
  btn.className = clsMap[f] || 'fbtn fa';
  render();
}

function addFilm(titleOverride, formats) {
  const title = (titleOverride || document.getElementById('new-title').value).trim();
  if (!title) return;
  const bluray = formats ? formats.bluray : document.getElementById('a-bl').checked;
  const bluray4k = formats ? formats.bluray4k : document.getElementById('a-4k').checked;
  const dvd = formats ? formats.dvd : document.getElementById('a-dv').checked;
  const steelbook = formats ? formats.steelbook : document.getElementById('a-st').checked;
  if (!bluray&&!bluray4k&&!dvd&&!steelbook) { alert('Sélectionne au moins un format !'); return; }
  films.push({id: Date.now()+Math.random(), title, bluray, bluray4k, dvd, steelbook});
  save();
  if (!titleOverride) {
    document.getElementById('new-title').value = '';
    ['a-bl','a-4k','a-dv','a-st'].forEach(x => document.getElementById(x).checked = false);
  }
  render();
  toast('✅ "'+title+'" ajouté !');
}

function deleteFilm(id, e) {
  e&&e.stopPropagation();
  const f = films.find(x=>x.id==id);
  if (!f||!confirm('Supprimer "'+f.title+'" ?')) return;
  films = films.filter(x=>x.id!=id);
  save(); render(); toast('🗑 Supprimé');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._t); t._t = setTimeout(()=>t.style.display='none', 2800);
}
</script>
