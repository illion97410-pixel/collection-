<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ma Collection</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ma Collection">
<meta name="theme-color" content="#000000">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--sur:#050508;--card:#0d0d12;--card2:#111116;
  --bord:#1a1230;--bord2:#0f0b1e;--txt:#fff;--muted:#444466;
  --pu:#9333ea;--pu2:#c084fc;--blu:#60a5fa;--k4:#c084fc;
  --dvd:#fbbf24;--stl:#34d399;--red:#f87171;
}
body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}



/* NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--bord);display:flex;z-index:200;padding:6px 0 calc(6px + env(safe-area-inset-bottom))}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 4px;cursor:pointer;color:var(--muted);border:none;background:none;transition:color .15s}
.nb.on{color:var(--pu)}
.nd{width:4px;height:4px;border-radius:50%;background:var(--pu);opacity:0}
.nb.on .nd{opacity:1}

/* HEADER */
header{background:var(--sur);border-bottom:1px solid var(--bord);padding:12px 14px;position:sticky;top:0;z-index:100}
.ht{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hl{display:flex;align-items:center;gap:7px}
.hbar{width:3px;height:20px;background:var(--pu);border-radius:2px}
h1{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:2px;white-space:nowrap}
.vbts{display:flex;gap:5px}
.vbt{background:var(--card);border:1px solid var(--bord);color:var(--muted);padding:5px 9px;border-radius:7px;cursor:pointer;transition:all .15s}
.vbt.on{border-color:var(--pu);color:var(--pu);background:rgba(147,51,234,.1)}
.srow{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.st{font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;border:1px solid transparent;white-space:nowrap}
.st0{background:rgba(147,51,234,.15);color:var(--pu2);border-color:rgba(147,51,234,.3)}
.st1{background:rgba(96,165,250,.08);color:var(--blu);border-color:rgba(96,165,250,.15)}
.st2{background:rgba(192,132,252,.08);color:var(--k4);border-color:rgba(192,132,252,.15)}
.st3{background:rgba(251,191,36,.08);color:var(--dvd);border-color:rgba(251,191,36,.15)}
.st4{background:rgba(52,211,153,.08);color:var(--stl);border-color:rgba(52,211,153,.15)}
.sw{position:relative}
.sw input{width:100%;background:var(--card);border:1px solid var(--bord);color:var(--txt);padding:8px 12px 8px 34px;border-radius:9px;font-size:13px;outline:none;transition:border-color .2s}
.sw input:focus{border-color:var(--pu)}
.sw input::placeholder{color:var(--muted)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none}
.frow{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px}
.fb{padding:4px 11px;border-radius:20px;border:1px solid var(--bord);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.fb.fa{background:var(--pu);color:#fff;border-color:var(--pu)}
.fb.fb1{background:rgba(96,165,250,.1);color:var(--blu);border-color:rgba(96,165,250,.25)}
.fb.fb2{background:rgba(192,132,252,.1);color:var(--k4);border-color:rgba(192,132,252,.25)}
.fb.fb3{background:rgba(251,191,36,.1);color:var(--dvd);border-color:rgba(251,191,36,.25)}
.fb.fb4{background:rgba(52,211,153,.1);color:var(--stl);border-color:rgba(52,211,153,.25)}
.sortrow{display:flex;align-items:center;gap:7px;margin-top:7px}
.sortrow span{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.5px;white-space:nowrap}
.sortrow select{flex:1;background:var(--card);border:1px solid var(--bord);color:var(--txt);padding:5px 9px;border-radius:8px;font-size:11px;outline:none;cursor:pointer}

/* PAGES */
.pg{display:none;padding-bottom:80px}
.pg.on{display:block}

/* GRID */
.cw{padding:0 12px}
.rc{font-size:11px;color:var(--muted);padding:8px 4px 5px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:8px;padding:4px}
.gc{background:var(--card);border-radius:10px;overflow:hidden;position:relative;border:1px solid var(--bord2)}
.pw{position:relative;width:100%;aspect-ratio:2/3;background:var(--card2);overflow:hidden;cursor:pointer}
.gp{width:100%;height:100%;object-fit:cover;display:none}
.gp.ld{display:block}
.ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:absolute;top:0;left:0}
.gi{padding:6px 7px}
.gt{font-size:10px;font-weight:600;color:var(--txt);line-height:1.3;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.gb{display:flex;gap:2px;flex-wrap:wrap}
.bd{font-size:7px;font-weight:700;padding:2px 4px;border-radius:3px}
.bb{background:rgba(96,165,250,.15);color:var(--blu)}
.bk{background:rgba(192,132,252,.15);color:var(--k4)}
.bd2{background:rgba(251,191,36,.15);color:var(--dvd)}
.bs{background:rgba(52,211,153,.15);color:var(--stl)}
.crown{position:absolute;top:4px;left:4px;font-size:12px;pointer-events:none}
.cmb{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.8);border:1px solid var(--bord);border-radius:5px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--pu2);font-size:15px;font-weight:900;z-index:2}

/* LIST */
.lw{overflow-x:auto;padding:0 12px}
.lt{width:100%;border-collapse:collapse;min-width:360px}
.lt thead th{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:9px 9px 7px;border-bottom:1px solid var(--bord);text-align:left;background:var(--bg)}
.lt thead th:not(:first-child){text-align:center}
.lt tbody tr{border-bottom:1px solid rgba(26,18,48,.5);transition:background .1s}
.lt tbody tr:hover{background:var(--sur)}
.lt td{padding:7px 9px;font-size:12px;vertical-align:middle}
.lt td:not(:first-child){text-align:center}
.lth{width:26px;height:39px;object-fit:cover;border-radius:3px;background:var(--card2);margin-right:7px;vertical-align:middle;cursor:pointer}
.ltc{display:flex;align-items:center}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%}
.db{background:var(--blu)}.dk{background:var(--k4)}.dd{background:var(--dvd)}.ds{background:var(--stl)}
.de{background:transparent;border:1px solid var(--bord)}
.lmb{background:none;border:none;color:var(--pu2);cursor:pointer;font-size:15px;font-weight:900;padding:2px 5px}

/* CTX */
.cov{position:fixed;inset:0;z-index:399}
.ctx{position:fixed;background:var(--card);border:1px solid var(--bord);border-radius:13px;z-index:400;min-width:215px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.9)}
.cth{padding:9px 11px;border-bottom:1px solid var(--bord);background:var(--sur)}
.ctt{font-size:12px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:195px}
.ctf{display:flex;gap:4px;flex-wrap:wrap;padding:9px 11px;border-bottom:1px solid var(--bord)}
.cf{font-size:9px;font-weight:700;padding:3px 8px;border-radius:5px;cursor:pointer;border:1px solid var(--bord);color:var(--muted);background:var(--card2);user-select:none}
.cf.ab{background:rgba(96,165,250,.15);color:var(--blu);border-color:rgba(96,165,250,.3)}
.cf.ak{background:rgba(192,132,252,.15);color:var(--k4);border-color:rgba(192,132,252,.3)}
.cf.ad{background:rgba(251,191,36,.15);color:var(--dvd);border-color:rgba(251,191,36,.3)}
.cf.as{background:rgba(52,211,153,.15);color:var(--stl);border-color:rgba(52,211,153,.3)}
.csb{width:calc(100% - 22px);margin:7px 11px;background:var(--pu);color:#fff;border:none;padding:7px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer}
.ci{display:flex;align-items:center;gap:7px;padding:9px 11px;cursor:pointer;font-size:12px;transition:background .1s}
.ci:hover{background:rgba(255,255,255,.04)}
.ci svg{flex-shrink:0}
.cix{border-top:1px solid var(--bord);color:var(--pu2)}
.cdel{color:var(--red);border-top:1px solid var(--bord)}

/* FILM MODAL */
.fmb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:500;overflow-y:auto}
.fmb.on{display:block}
.fm{background:var(--bg);min-height:100%;max-width:500px;margin:0 auto;padding-bottom:40px}
.fh{background:var(--sur);padding:14px;display:flex;gap:12px;position:relative;border-bottom:1px solid var(--bord)}
.fbk{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.8);border:1px solid var(--bord);border-radius:7px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt);font-size:15px}
.fp{width:85px;height:127px;object-fit:cover;border-radius:9px;background:var(--card2);flex-shrink:0;border:1px solid var(--bord)}
.ffi{flex:1;min-width:0}
.ftb{font-size:16px;font-weight:700;line-height:1.2;margin-bottom:4px}
.fdr{font-size:11px;color:var(--pu2);margin-bottom:3px}
.fmt{font-size:10px;color:var(--muted);margin-bottom:7px}
.fra{font-size:13px;color:var(--dvd);font-weight:700;margin-bottom:8px}
.ffs{display:flex;gap:4px;flex-wrap:wrap}
.ff{font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px}
.fb2{background:rgba(96,165,250,.15);color:var(--blu);border:1px solid rgba(96,165,250,.25)}
.fk{background:rgba(192,132,252,.15);color:var(--k4);border:1px solid rgba(192,132,252,.25)}
.fd2{background:rgba(251,191,36,.15);color:var(--dvd);border:1px solid rgba(251,191,36,.25)}
.fs{background:rgba(52,211,153,.15);color:var(--stl);border:1px solid rgba(52,211,153,.25)}
.fbdy{padding:14px}
.fsec{font-size:9px;font-weight:700;color:var(--pu);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;margin-top:14px}
.fsec:first-child{margin-top:0}
.fgs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:3px}
.fge{font-size:11px;padding:3px 9px;border-radius:5px;background:var(--card);color:var(--pu2);border:1px solid var(--bord)}
.fov{font-size:13px;color:#666688;line-height:1.7;margin-bottom:3px}
.fcc{background:var(--card);border-radius:9px;padding:11px;margin-bottom:3px}
.fpe{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.fpe:last-child{margin-bottom:0}
.fav{width:32px;height:32px;border-radius:50%;background:var(--card2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;border:1px solid var(--bord)}
.fav img{width:100%;height:100%;object-fit:cover}
.fpn{font-size:12px;font-weight:600}
.fpr{font-size:10px;color:var(--muted)}
.trb{display:flex;align-items:center;gap:7px;background:rgba(147,51,234,.1);border:1px solid rgba(147,51,234,.2);color:var(--pu2);padding:9px 12px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;width:100%;margin-bottom:3px}
.simgr{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:7px}
.smc{border-radius:7px;overflow:hidden;cursor:pointer;background:var(--card)}
.smp{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--card2);display:block}
.smt{font-size:8px;color:var(--txt);font-weight:600;padding:3px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}

/* LINK MODAL */
.lmb2{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:700;align-items:flex-end;justify-content:center}
.lmb2.on{display:flex}
.lm{background:var(--sur);border:1px solid var(--bord);border-top:2px solid var(--pu);border-radius:20px 20px 0 0;padding:18px 14px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
.lm h3{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:2px;margin-bottom:3px}
.lfn{font-size:12px;color:var(--pu2);margin-bottom:11px}
.lsr{position:relative;margin-bottom:9px}
.lsi{width:100%;background:var(--card);border:1px solid var(--bord);color:var(--txt);padding:9px 13px 9px 34px;border-radius:9px;font-size:14px;outline:none;transition:border-color .2s}
.lsi:focus{border-color:var(--pu)}
.lsi::placeholder{color:var(--muted)}
.lsic{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none}
.lrs{display:flex;flex-direction:column;gap:5px;max-height:42vh;overflow-y:auto}
.lr{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--card);border-radius:9px;cursor:pointer;border:1px solid var(--bord);transition:all .15s}
.lr:hover,.lr.on{border-color:var(--pu);background:rgba(147,51,234,.1)}
.lr img{width:34px;height:51px;object-fit:cover;border-radius:4px;background:var(--card2);flex-shrink:0}
.lri{flex:1;min-width:0}
.lrt{font-size:13px;font-weight:600}
.lrm{font-size:11px;color:var(--muted);margin-top:2px}
.lbts{display:flex;gap:7px;margin-top:12px}
.lbs{flex:1;background:var(--pu);color:#fff;border:none;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.lbc{background:var(--card);color:var(--muted);border:1px solid var(--bord);padding:12px 16px;border-radius:10px;font-size:14px;cursor:pointer}

/* POSTER MODAL */
.pmb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:700;align-items:flex-end;justify-content:center}
.pmb.on{display:flex}
.pm{background:var(--sur);border:1px solid var(--bord);border-top:2px solid var(--pu);border-radius:20px 20px 0 0;padding:18px 14px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
.pm h3{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:2px;margin-bottom:3px}
.pfn{font-size:12px;color:var(--pu2);margin-bottom:11px}
.pgr{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:9px;margin-bottom:12px}
.po{cursor:pointer;border-radius:8px;overflow:hidden;border:2px solid var(--bord);position:relative;transition:border-color .15s}
.po.on{border-color:var(--pu)}
.po img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
.polang{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);font-size:8px;font-weight:700;color:#fff;padding:3px;text-align:center}
.pochk{position:absolute;top:4px;right:4px;background:var(--pu);border-radius:50%;width:17px;height:17px;display:flex;align-items:center;justify-content:center;font-size:10px;display:none}
.po.on .pochk{display:flex}
.pbts{display:flex;gap:7px}
.pbs{flex:1;background:var(--pu);color:#fff;border:none;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.pbc{background:var(--card);color:var(--muted);border:1px solid var(--bord);padding:12px 16px;border-radius:10px;font-size:14px;cursor:pointer}

/* ADD PAGE */
.aw{padding:11px 14px}
.pt{font-size:9px;font-weight:700;color:var(--pu);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px}
.saw{position:relative}
.sai{width:100%;background:var(--card);border:1px solid var(--bord);color:var(--txt);padding:9px 13px 9px 34px;border-radius:9px;font-size:14px;outline:none;transition:border-color .2s}
.sai:focus{border-color:var(--pu)}
.sai::placeholder{color:var(--muted)}
.saic{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none}
.tr{background:var(--card);border:1px solid var(--bord);border-radius:11px;margin-top:5px;display:none;max-height:390px;overflow-y:auto}
.tri{display:flex;align-items:center;gap:9px;padding:9px 11px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--bord)}
.tri:last-child{border-bottom:none}
.tri:active{background:var(--card2)}
.trt{width:34px;height:51px;object-fit:cover;border-radius:4px;background:var(--card2);flex-shrink:0}
.trin{flex:1;min-width:0}
.trtt{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trty{font-size:11px;color:var(--muted);margin-top:1px}
.tro{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.trb2{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px}
.trbo{background:rgba(147,51,234,.15);color:var(--pu2);border:1px solid rgba(147,51,234,.25)}
.trbn{background:rgba(255,255,255,.04);color:var(--muted)}

/* FMT MODAL */
.fmtb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:600;align-items:flex-end;justify-content:center}
.fmtb.on{display:flex}
.fmt{background:var(--sur);border:1px solid var(--bord);border-top:2px solid var(--pu);border-radius:20px 20px 0 0;padding:18px 14px;width:100%;max-width:500px}
.fmth{display:flex;gap:11px;align-items:center;margin-bottom:16px}
.fmtp{width:50px;height:75px;object-fit:cover;border-radius:7px;background:var(--card2);flex-shrink:0;border:1px solid var(--bord)}
.fmttl{font-size:15px;font-weight:700}
.fmtyr{font-size:11px;color:var(--muted);margin-top:2px}
.fmtlb{font-size:9px;font-weight:700;color:var(--pu);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:9px}
.fmtgr{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:16px}
.fo{padding:13px 11px;border-radius:11px;border:1.5px solid var(--bord);cursor:pointer;transition:all .15s;text-align:center;background:var(--card)}
.foc{font-size:17px;margin-bottom:3px}
.fon{font-size:11px;font-weight:700;letter-spacing:.5px}
.fo1 .fon{color:var(--blu)}.fo2 .fon{color:var(--k4)}.fo3 .fon{color:var(--dvd)}.fo4 .fon{color:var(--stl)}
.fo.sb{border-color:var(--blu);background:rgba(96,165,250,.1)}
.fo.sk{border-color:var(--k4);background:rgba(192,132,252,.1)}
.fo.sd{border-color:var(--dvd);background:rgba(251,191,36,.1)}
.fo.ss{border-color:var(--stl);background:rgba(52,211,153,.1)}
.fmtbts{display:flex;gap:7px}
.fmtsv{flex:1;background:var(--pu);color:#fff;border:none;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.fmtcn{background:var(--card);color:var(--muted);border:1px solid var(--bord);padding:12px 16px;border-radius:10px;font-size:14px;cursor:pointer}

/* STATS */
.stw{padding:11px 14px 80px}
.stsc{margin-bottom:18px}
.sttl{font-size:9px;font-weight:700;color:var(--pu);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:9px}
.stn{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px}
.stnc{background:var(--card);border:1px solid var(--bord);border-radius:9px;padding:11px;text-align:center}
.stnum{font-size:21px;font-weight:700;color:var(--pu2)}
.stnlb{font-size:9px;color:var(--muted);margin-top:2px}
.stcd{background:var(--card);border:1px solid var(--bord);border-radius:11px;padding:11px;margin-bottom:7px}
.stbr{display:flex;align-items:center;gap:7px;margin-bottom:5px;cursor:pointer;border-radius:5px;padding:3px;transition:background .15s}
.stbr:hover{background:rgba(147,51,234,.08)}
.stbr:last-child{margin-bottom:0}
.stbl{font-size:11px;color:var(--txt);min-width:125px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stbt{flex:1;background:var(--card2);border-radius:3px;height:6px;overflow:hidden}
.stbf{height:100%;background:var(--pu);border-radius:3px}
.stbc{font-size:11px;font-weight:700;color:var(--pu2);min-width:26px;text-align:right}
.stfb{display:flex;gap:2px;height:9px;border-radius:4px;overflow:hidden;margin-bottom:7px}
.stdc{display:flex;gap:4px;align-items:flex-end;height:58px;margin-top:7px}
.stdb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.stdf{width:100%;background:rgba(147,51,234,.5);border-radius:2px 2px 0 0;min-height:4px}
.stdf.mx{background:var(--pu)}
.stdl{font-size:8px;color:var(--muted)}
.stpb{background:var(--card);border-radius:7px;padding:11px;margin-bottom:14px;font-size:12px;color:var(--muted);text-align:center}
.stpbr{background:var(--card2);border-radius:3px;height:4px;margin-top:7px;overflow:hidden}
.stpbf{height:100%;background:var(--pu);border-radius:3px;transition:width .3s}
.stdd{background:var(--card2);border-radius:9px;padding:11px;margin-top:5px;display:none}
.stdd.on{display:block}
.stddtl{font-size:11px;font-weight:700;color:var(--pu2);margin-bottom:7px}
.ddgr{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:5px}
.ddc{background:var(--card);border-radius:6px;overflow:hidden;cursor:pointer}
.ddp{width:100%;aspect-ratio:2/3;object-fit:cover;background:var(--card2);display:block}
.ddt{font-size:8px;color:var(--txt);padding:3px;font-weight:600}

.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:var(--pu);color:#fff;padding:9px 18px;border-radius:9px;font-size:13px;font-weight:700;z-index:999;display:none;white-space:nowrap;box-shadow:0 4px 18px rgba(147,51,234,.5)}
</style>

function go(){

  catch(e){films=DF.map(function(f,i){return Object.assign({},f,{id:i+1});}); }
  try{PC=JSON.parse(localStorage.getItem(PK))||{};}catch(e){PC={};}
  try{FM=JSON.parse(localStorage.getItem(MK))||{};}catch(e){FM={};}
  try{LM=JSON.parse(localStorage.getItem(LK))||{};}catch(e){LM={};}
  ren();
}

// NAV
function pg(p){
  document.querySelectorAll('.pg').forEach(function(x){x.classList.remove('on');});
  document.querySelectorAll('.nb').forEach(function(x){x.classList.remove('on');});
  document.getElementById('pg-'+p).classList.add('on');
  document.getElementById('nb-'+p).classList.add('on');
  if(p==='stats'&&!stLoaded)ldStats();
}

// SEARCH + SORT
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dot(v,c){return '<span class="dot '+(v?c:'de')+'"></span>';}

function mf(f){
  if(filt==='b')return f.bluray===true;
  if(filt==='k')return f.bluray4k===true;
  if(filt==='d')return f.dvd===true;
  if(filt==='s')return f.steelbook===true;
  return true;
}

function gf(){
  var q=document.getElementById('srch').value.toLowerCase().trim();
  return films.filter(function(f){return(!q||f.title.toLowerCase().indexOf(q)>=0)&&mf(f);});
}

function sorted(arr){
  var a=arr.slice();
  var s=document.getElementById('srtsel')?document.getElementById('srtsel').value:'alpha-asc';
  if(s==='alpha-asc')a.sort(function(x,y){return x.title.localeCompare(y.title,'fr');});
  else if(s==='alpha-desc')a.sort(function(x,y){return y.title.localeCompare(x.title,'fr');});
  else if(s==='add-new')a.sort(function(x,y){return (y.id||0)-(x.id||0);});
  else if(s==='add-old')a.sort(function(x,y){return (x.id||0)-(y.id||0);});
  else if(s==='yr-new')a.sort(function(x,y){
    var mx=FM[x.title.toLowerCase().trim()];var my=FM[y.title.toLowerCase().trim()];
    return (my?parseInt(my.year||0):0)-(mx?parseInt(mx.year||0):0);
  });
  else if(s==='yr-old')a.sort(function(x,y){
    var mx=FM[x.title.toLowerCase().trim()];var my=FM[y.title.toLowerCase().trim()];
    return (mx?parseInt(mx.year||9999):9999)-(my?parseInt(my.year||9999):9999);
  });
  else if(s==='rat')a.sort(function(x,y){
    var mx=FM[x.title.toLowerCase().trim()];var my=FM[y.title.toLowerCase().trim()];
    return (my?parseFloat(my.rating||0):0)-(mx?parseFloat(mx.rating||0):0);
  });
  else if(s==='dir')a.sort(function(x,y){
    var mx=FM[x.title.toLowerCase().trim()];var my=FM[y.title.toLowerCase().trim()];
    return ((mx?mx.director||'':x.title)).localeCompare((my?my.director||'':y.title),'fr');
  });
  return a;
}

function hdSrch(){
  clearTimeout(MT);
  ren();
  var q=document.getElementById('srch').value.toLowerCase().trim();
  if(q.length>=2)MT=setTimeout(function(){renMeta(q);},400);
}

function renMeta(q){
  var tIds=new Set(gf().map(function(f){return f.id;}));
  var mIds=new Set();
  Object.keys(FM).forEach(function(key){
    var m=FM[key];if(!m)return;
    var dm=m.director&&m.director.toLowerCase().indexOf(q)>=0;
    var am=m.cast&&m.cast.some(function(a){return a.name&&a.name.toLowerCase().indexOf(q)>=0;});
    var cm=m.countries&&m.countries.some(function(c){return(CN[c]||'').toLowerCase().indexOf(q)>=0;});
    if(dm||am||cm){var f=films.find(function(x){return x.title.toLowerCase().trim()===key;});if(f)mIds.add(f.id);}
  });
  if(mIds.size>0){
    var all=new Set(Array.from(tIds).concat(Array.from(mIds)));
    var filtered=sorted(films.filter(function(f){return all.has(f.id)&&mf(f);}));
    document.getElementById('rc').textContent=filtered.length+' film'+(filtered.length!==1?'s':'')+' trouves';
    if(vw==='grid')renGrid(filtered);else renList(filtered);
  }
}

// RENDER
function updSt(){
  document.getElementById('st0').textContent=films.length+' films';
  document.getElementById('st1').textContent='● '+films.filter(function(f){return f.bluray;}).length+' BLU-RAY';
  document.getElementById('st2').textContent='● '+films.filter(function(f){return f.bluray4k;}).length+' 4K';
  document.getElementById('st3').textContent='● '+films.filter(function(f){return f.dvd;}).length+' DVD';
  document.getElementById('st4').textContent='● '+films.filter(function(f){return f.steelbook;}).length+' STEELBOOK';
}

function ren(){
  updSt();
  var f=sorted(gf());
  document.getElementById('rc').textContent=f.length+' film'+(f.length!==1?'s':'');
  if(vw==='grid')renGrid(f);else renList(f);
}

function renGrid(fl){
  var h='';
  fl.forEach(function(f){
    var c=PC[f.title.toLowerCase().trim()];
    var hi=c&&c!==null;
    var bd='';
    if(f.bluray)bd+='<span class="bd bb">BLU-RAY</span>';
    if(f.bluray4k)bd+='<span class="bd bk">4K</span>';
    if(f.dvd)bd+='<span class="bd bd2">DVD</span>';
    if(f.steelbook)bd+='<span class="bd bs">SB</span>';
    h+='<div class="gc">';
    if(f.steelbook)h+='<div class="crown">&#x1F451;</div>';
    h+='<div class="pw" onclick="opnFm('+f.id+')">';
    h+='<div class="ph" data-id="'+f.id+'" style="'+(hi?'display:none':'')+'">';
    h+='<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#1a1230" stroke-width="1.5"><path d="M7 4v16M17 4v16M3 8h4m10 0h4M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"/></svg>';
    h+='</div>';
    h+='<img class="gp'+(hi?' ld':'')+'" data-id="'+f.id+'" src="'+(hi?c:'')+'" alt="" loading="lazy">';
    h+='</div>';
    h+='<div class="cmb" onclick="opnCx(event,'+f.id+')">&#xB7;&#xB7;&#xB7;</div>';
    h+='<div class="gi"><div class="gt">'+esc(f.title)+'</div><div class="gb">'+bd+'</div></div>';
    h+='</div>';
  });
  document.getElementById('gv').innerHTML=h;
  ldPosters(fl);
}

function renList(fl){
  var h='';
  fl.forEach(function(f){
    var c=PC[f.title.toLowerCase().trim()];
    var src=c&&c!==null?c:'';
    h+='<tr>';
    h+='<td><div class="ltc">';
    h+='<img class="lth" data-id="'+f.id+'" src="'+src+'" alt="" loading="lazy" style="opacity:'+(src?'1':'.25')+'" onclick="opnFm('+f.id+')">';
    h+='<span onclick="opnFm('+f.id+')" style="cursor:pointer">'+esc(f.title)+'</span>';
    h+='</div></td>';
    h+='<td>'+dot(f.bluray,'db')+'</td><td>'+dot(f.bluray4k,'dk')+'</td>';
    h+='<td>'+dot(f.dvd,'dd')+'</td><td>'+dot(f.steelbook,'ds')+'</td>';
    h+='<td><button class="lmb" onclick="opnCx(event,'+f.id+')">&#xB7;&#xB7;&#xB7;</button></td>';
    h+='</tr>';
  });
  document.getElementById('lb').innerHTML=h;
  ldPosters(fl);
}

async function ldPosters(fl){
  var uc=fl.filter(function(f){return PC[f.title.toLowerCase().trim()]===undefined;});
  for(var i=0;i<uc.length;i+=5){
    await Promise.all(uc.slice(i,i+5).map(function(f){return gtPost(f.title,f.id);}));
    await new Promise(function(r){setTimeout(r,200);});
  }
}

  document.getElementById('vbl').classList.toggle('on',v==='list');
  ren();
}

  filt=f;
  ['fa','fb1','fb2','fb3','fb4'].forEach(function(c){

// META
async function gtMeta(tt,id){
  var key=tt.toLowerCase().trim();
  if(FM[key])return FM[key];
  if(LM[key])return await gtMetaById(LM[key],tt,id);
  try{
    var yr=null;var ym=tt.match(/\(\d{4}\)$/);
    if(ym)yr=ym[0].slice(1,5);
    var ct=tt.replace(/\s*\(\d{4}\)$/,'').trim();
    var url='https://api.themoviedb.org/3/search/movie?api_key='+TMDB+'&query='+encodeURIComponent(ct)+'&language=fr-FR';
    if(yr)url+='&year='+yr;
    var r=await fetch(url);var d=await r.json();
    if(!d.results||!d.results.length)return null;
    var best=d.results[0];
    if(yr){var y2=d.results.find(function(m){return m.release_date&&m.release_date.indexOf(yr)===0;});if(y2)best=y2;}
    return await gtMetaById(best.id,tt,id);
  }catch(e){return null;}
}

var CF={FR:'France',US:'Etats-Unis',GB:'Royaume-Uni',IT:'Italie',DE:'Allemagne',JP:'Japon',ES:'Espagne',KR:'Coree',CN:'Chine',BE:'Belgique',SE:'Suede',DK:'Danemark',HK:'Hong Kong',PL:'Pologne',RU:'Russie'};
var CN={FR:'France',US:'Etats-Unis',GB:'Royaume-Uni',IT:'Italie',DE:'Allemagne',JP:'Japon',ES:'Espagne',KR:'Coree du Sud',CN:'Chine',BE:'Belgique',SE:'Suede',DK:'Danemark',HK:'Hong Kong',PL:'Pologne',RU:'Russie',IN:'Inde',AU:'Australie',BR:'Bresil'};

async function gtMetaById(tid,tt,fid){
  var key=tt.toLowerCase().trim();
  try{
    var rs=await Promise.all([
      fetch('https://api.themoviedb.org/3/movie/'+tid+'?api_key='+TMDB+'&language=fr-FR'),
      fetch('https://api.themoviedb.org/3/movie/'+tid+'/credits?api_key='+TMDB),
      fetch('https://api.themoviedb.org/3/movie/'+tid+'/videos?api_key='+TMDB+'&language=fr-FR')
    ]);
    var dt=await rs[0].json(),cr=await rs[1].json(),vd=await rs[2].json();
    var dir='';(cr.crew||[]).forEach(function(c){if(c.job==='Director')dir=c.name;});
    var cast=(cr.cast||[]).slice(0,6).map(function(a){return{name:a.name,character:a.character,photo:a.profile_path?'https://image.tmdb.org/t/p/w92'+a.profile_path:null};});
    var trl=null;(vd.results||[]).forEach(function(v){if(!trl&&v.type==='Trailer'&&v.site==='YouTube')trl=v;});
    if(!trl&&vd.results&&vd.results.length)trl=vd.results[0];
    var c0=dt.production_countries&&dt.production_countries[0]?dt.production_countries[0].iso_3166_1:'';
    var ctry=CF[c0]||(dt.production_countries&&dt.production_countries[0]?dt.production_countries[0].name:'');
    var ctrs=(dt.production_countries||[]).map(function(c){return c.iso_3166_1;});
    var m={tmdbId:tid,title:dt.title,year:dt.release_date?dt.release_date.substring(0,4):null,overview:dt.overview,rating:dt.vote_average,runtime:dt.runtime,country:ctry,genres:(dt.genres||[]).map(function(g){return g.name;}),director:dir,cast:cast,posterPath:dt.poster_path,countries:ctrs,trailerId:trl?trl.key:null};
    FM[key]=m;svM();
    if(dt.poster_path){PC[key]='https://image.tmdb.org/t/p/w300'+dt.poster_path;svP();updPD(fid,PC[key]);}
    return m;
  }catch(e){return null;}
}

async function gtPost(tt,id){
  var key=tt.toLowerCase().trim();
  if(PC[key]!==undefined)return PC[key];
  if(FM[key]&&FM[key].posterPath){var u='https://image.tmdb.org/t/p/w300'+FM[key].posterPath;PC[key]=u;svP();updPD(id,u);return u;}
  if(LM[key])return(await gtMetaById(LM[key],tt,id))?PC[key]:null;
  var yr=null;var ym=tt.match(/\(\d{4}\)$/);if(ym)yr=ym[0].slice(1,5);
  var ct=tt.replace(/\s*\(\d{4}\)$/,'').trim();
  var vs=[ct];
  var na=ct.replace(/^(le |la |les |l'|un |une |des )/i,'').trim();
  if(na!==ct)vs.push(na);
  for(var li=0;li<2;li++){
    var lang=li===0?'fr-FR':'en-US';
    for(var vi=0;vi<vs.length;vi++){
      try{
        var url='https://api.themoviedb.org/3/search/movie?api_key='+TMDB+'&query='+encodeURIComponent(vs[vi])+'&language='+lang;
        if(yr)url+='&year='+yr;
        var r=await fetch(url);var d=await r.json();
        if(d.results&&d.results.length){
          var best=d.results[0];
          if(yr){var y2=d.results.find(function(m){return m.release_date&&m.release_date.indexOf(yr)===0;});if(y2)best=y2;}
          if(best.poster_path){var iu='https://image.tmdb.org/t/p/w300'+best.poster_path;PC[key]=iu;svP();updPD(id,iu);return iu;}
        }
      }catch(e){}
    }
  }
  PC[key]=null;return null;
}

function updPD(id,url){
  document.querySelectorAll('.gp[data-id="'+id+'"]').forEach(function(el){el.src=url;el.classList.add('ld');});
  document.querySelectorAll('.ph[data-id="'+id+'"]').forEach(function(el){el.style.display='none';});
  document.querySelectorAll('.lth[data-id="'+id+'"]').forEach(function(el){el.src=url;el.style.opacity='1';});
}

// STATS
async function ldStats(){
  stLoaded=true;
  var sc=document.getElementById('stc');
  var tot=films.length;
  var nb=films.filter(function(f){return f.bluray;}).length;
  var nk=films.filter(function(f){return f.bluray4k;}).length;
  var nd=films.filter(function(f){return f.dvd;}).length;
  var ns=films.filter(function(f){return f.steelbook;}).length;
  sc.innerHTML=
    '<div class="stsc"><div class="sttl">Vue d'ensemble</div><div class="stn">'+
    '<div class="stnc"><div class="stnum">'+tot+'</div><div class="stnlb">FILMS</div></div>'+
    '<div class="stnc"><div class="stnum" style="color:var(--stl)">'+ns+'</div><div class="stnlb">STEELBOOKS</div></div>'+
    '<div class="stnc"><div class="stnum" style="color:var(--blu)">'+nb+'</div><div class="stnlb">BLU-RAY</div></div>'+
    '<div class="stnc"><div class="stnum" style="color:var(--k4)">'+nk+'</div><div class="stnlb">4K UHD</div></div>'+
    '</div></div>'+
    '<div class="stsc"><div class="sttl">Formats</div><div class="stcd">'+
    '<div class="stfb"><div style="flex:'+nb+';background:var(--blu)"></div><div style="flex:'+nk+';background:var(--k4)"></div><div style="flex:'+nd+';background:var(--dvd)"></div><div style="flex:'+ns+';background:var(--stl)"></div></div>'+
    '<div style="display:flex;gap:9px;flex-wrap:wrap;margin-top:5px">'+
    '<span style="font-size:10px;color:var(--blu)">'+nb+' Blu-ray</span>'+
    '<span style="font-size:10px;color:var(--k4)">'+nk+' 4K</span>'+
    '<span style="font-size:10px;color:var(--dvd)">'+nd+' DVD</span>'+
    '<span style="font-size:10px;color:var(--stl)">'+ns+' SB</span>'+
    '</div></div></div>'+
    '<div class="stpb" id="stpb"><div id="stpt">Analyse... 0%</div><div class="stpbr"><div class="stpbf" id="stpbf" style="width:0%"></div></div></div>'+
    '<div id="stad"></div>';

  var dirs={},ctrs={},decs={},gnr={},acts={};
  var done=0;
  for(var i=0;i<films.length;i+=8){
    await Promise.all(films.slice(i,i+8).map(async function(f){
      var m=await gtMeta(f.title,f.id);
      if(m){
        if(m.director)dirs[m.director]=(dirs[m.director]||0)+1;
        (m.countries||[]).forEach(function(c){ctrs[c]=(ctrs[c]||0)+1;});
        if(m.year){var dec=Math.floor(parseInt(m.year)/10)*10;decs[dec]=(decs[dec]||0)+1;}
        (m.genres||[]).forEach(function(g){gnr[g]=(gnr[g]||0)+1;});
        (m.cast||[]).slice(0,3).forEach(function(a){if(a.name)acts[a.name]=(acts[a.name]||0)+1;});
      }
      done++;
    }));
    var pct=Math.round(done/tot*100);
    var pf=document.getElementById('stpbf');var pt=document.getElementById('stpt');
    if(pf)pf.style.width=pct+'%';
    if(pt)pt.textContent='Analyse... '+pct+'% ('+done+'/'+tot+')';
    if(done%80===0||done===tot)renStats(dirs,ctrs,decs,gnr,acts);
  }
  var pb=document.getElementById('stpb');if(pb)pb.style.display='none';
  renStats(dirs,ctrs,decs,gnr,acts);
}

function renStats(dirs,ctrs,decs,gnr,acts){
  var el=document.getElementById('stad');if(!el)return;
  var td=Object.entries(dirs).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
  var tc=Object.entries(ctrs).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
  var tg=Object.entries(gnr).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
  var ta=Object.entries(acts).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
  var md=td[0]?td[0][1]:1,mc=tc[0]?tc[0][1]:1,mg=tg[0]?tg[0][1]:1,ma=ta[0]?ta[0][1]:1;
  var mxd=Object.values(decs).reduce(function(a,b){return Math.max(a,b);},1);
  var dl=[1920,1930,1940,1950,1960,1970,1980,1990,2000,2010,2020].filter(function(d){return decs[d];});
  var db='';
  dl.forEach(function(d){
    db+='<div class="stdb"><div class="stdf '+(decs[d]===mxd?'mx':'')+'" style="height:'+Math.round(decs[d]/mxd*54)+'px"></div><div class="stdl">'+String(d).slice(-2)+'s</div></div>';
  });

  function bsec(ttl,items,mx,tp){
    var h='<div class="stsc"><div class="sttl">'+ttl+'</div><div class="stcd">';
    items.forEach(function(it,i){
      var nm=it[0],cnt=it[1];
      var disp=tp==='ctry'?(CN[nm]||nm):nm;
      var sid=(tp+nm).replace(/[^a-zA-Z0-9]/g,'_');
      h+='<div class="stbr" onclick="tgDd('dd-'+sid+'',''+tp+'',''+nm.replace(/'/g,"\'")+'')">';
      h+='<div class="stbl" style="color:'+(i===0?'var(--pu2)':'var(--txt)')+'">'+esc(disp)+'</div>';
      h+='<div class="stbt"><div class="stbf" style="width:'+Math.round(cnt/mx*100)+'%"></div></div>';
      h+='<div class="stbc">'+cnt+'</div>';
      h+='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#444466" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>';
      h+='</div><div class="stdd" id="dd-'+sid+'"></div>';
    });
    h+='</div></div>';
    return h;
  }

  var h='<div class="stsc"><div class="sttl">Par decennie</div><div class="stcd"><div class="stdc">'+db+'</div></div></div>';
  h+=bsec('Top realisateurs',td,md,'dir');
  h+=bsec('Top acteurs',ta,ma,'act');
  h+=bsec('Top pays',tc,mc,'ctry');
  h+=bsec('Top genres',tg,mg,'gnr');
  el.innerHTML=h;
}

function tgDd(ddId,tp,val){
  var dd=document.getElementById(ddId);if(!dd)return;
  if(dd.classList.contains('on')){dd.classList.remove('on');return;}
  document.querySelectorAll('.stdd.on').forEach(function(x){if(x.id!==ddId)x.classList.remove('on');});
  var mx=[];
  films.forEach(function(f){
    var m=FM[f.title.toLowerCase().trim()];if(!m)return;
    if(tp==='dir'&&m.director===val)mx.push(f);
    else if(tp==='act'&&m.cast&&m.cast.some(function(a){return a.name===val;}))mx.push(f);
    else if(tp==='ctry'&&m.countries&&m.countries.indexOf(val)>=0)mx.push(f);
    else if(tp==='gnr'&&m.genres&&m.genres.indexOf(val)>=0)mx.push(f);
  });
  if(!mx.length){dd.innerHTML='<div style="color:var(--muted);font-size:12px;padding:7px">Aucun film (donnees pas encore chargees)</div>';dd.classList.add('on');return;}
  var disp=tp==='ctry'?(CN[val]||val):val;
  var h='<div class="stddtl">'+mx.length+' films - '+esc(disp)+'</div><div class="ddgr">';
  mx.forEach(function(f){
    var cp=PC[f.title.toLowerCase().trim()];
    h+='<div class="ddc" onclick="pg('col');setTimeout(function(){opnFm('+f.id+');},300)">';
    if(cp)h+='<img class="ddp" src="'+cp+'" alt="" loading="lazy">';
    else h+='<div class="ddp" style="display:flex;align-items:center;justify-content:center"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#1a1230" stroke-width="1.5"><path d="M7 4v16M17 4v16M3 8h4m10 0h4M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"/></svg></div>';
    h+='<div class="ddt">'+esc(f.title)+'</div></div>';
  });
  h+='</div>';
  dd.innerHTML=h;dd.classList.add('on');
}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  clearTimeout(t._t);t._t=setTimeout(function(){t.style.display='none';},2800);
}

document.addEventListener('click',function(e){
  if(!e.target.closest('#pg-add'))document.getElementById('tr').style.display='none';
});
</script>
